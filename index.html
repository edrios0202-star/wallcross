<title>Wallcross</title>
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;font-size:15px;line-height:1.5;transition:background .2s,color .2s}
:root{--bg:#F5F4F0;--surface:#fff;--border:#E8E4DC;--border2:#D0C8BC;--text:#1A1A1A;--text2:#3A3028;--text3:#5A5040;--text4:#8A7E6A;--accent:#4B3FBF;--accent-bg:#EEEDFE;--accent-light:#F5F4FF;--success:#1A7A50;--success-bg:#E8F5EE;--warn:#C47000;--warn-bg:#FFF4E6;--danger:#C02020;--danger-bg:#FFEDED;--input-bg:#FAFAF7}
.dark{--bg:#111010;--surface:#1C1B1A;--border:#2A2826;--border2:#3A3630;--text:#F0EDE8;--text2:#D8D0C8;--text3:#A89E90;--text4:#6A6058;--accent:#7B70E8;--accent-bg:#1E1C3A;--accent-light:#1A1928;--success:#2AAA70;--success-bg:#0A2A1A;--warn:#D48010;--warn-bg:#2A1E08;--danger:#E03030;--danger-bg:#2A0808;--input-bg:#151412}
button{font-family:inherit;cursor:pointer}textarea,input{font-family:inherit;font-size:15px}
::-webkit-scrollbar{width:3px}::-webkit-scrollbar-thumb{background:var(--border2);border-radius:2px}
.app{max-width:480px;margin:0 auto;min-height:100vh;display:flex;flex-direction:column}
.hdr{background:var(--surface);border-bottom:1px solid var(--border);padding:12px 14px 0;position:sticky;top:0;z-index:50}
.hdr-top{display:flex;align-items:center;justify-content:space-between;margin-bottom:9px}
.hdr-sub{font-size:11px;font-weight:600;letter-spacing:.1em;text-transform:uppercase;color:var(--text4);margin-bottom:1px}
.hdr-title{font-size:18px;font-weight:700;color:var(--text);letter-spacing:-.02em}
.badges{display:flex;gap:6px;align-items:center}
.b-streak{background:var(--warn-bg);border:1px solid #FFD699;border-radius:20px;padding:5px 10px;display:flex;align-items:center;gap:4px;font-size:13px;font-weight:700;color:var(--warn)}
.b-dark{background:var(--surface);border:1px solid var(--border);border-radius:20px;padding:5px 10px;font-size:15px}
.prog-bar{height:3px;background:var(--border)}.prog-fill{height:100%;background:linear-gradient(90deg,var(--accent),#2A8A70);transition:width .5s}
.assess-strip{padding:5px 0 7px;display:flex;align-items:center}
.b-assess{background:var(--danger-bg);border:1px solid #FFBBBB;border-radius:20px;padding:4px 9px;font-size:11px;font-weight:700;color:var(--danger)}
.tabs{display:flex;overflow-x:auto;scrollbar-width:none;-webkit-overflow-scrolling:touch}
.tabs::-webkit-scrollbar{display:none}
.tab{flex-shrink:0;padding:10px 9px 9px;background:none;border:none;border-bottom:2.5px solid transparent;display:flex;flex-direction:column;align-items:center;gap:3px;color:var(--text4);font-size:10px;font-weight:600;letter-spacing:.05em;text-transform:uppercase;white-space:nowrap;min-width:52px}
.tab.on{border-bottom-color:var(--accent);color:var(--accent)}
.body{padding:13px 13px 90px;flex:1}
.card{background:var(--surface);border:1px solid var(--border);border-radius:13px;overflow:hidden;margin-bottom:11px}
.card-hdr{background:linear-gradient(135deg,#4B3FBF 0%,#3A7BD5 100%);padding:14px}
.card-hdr-sub{font-size:11px;font-weight:600;letter-spacing:.1em;text-transform:uppercase;color:rgba(255,255,255,.7);margin-bottom:3px}
.card-hdr-title{font-size:18px;font-weight:700;color:#fff;letter-spacing:-.02em;line-height:1.2}
.card-hdr-meta{font-size:12px;color:rgba(255,255,255,.65);margin-top:3px}
.card-body{padding:13px 14px}
.case-hdr{background:linear-gradient(135deg,#1A4A7A 0%,#2A7A5A 100%);padding:13px}
.sl{font-size:11px;font-weight:700;letter-spacing:.09em;text-transform:uppercase;color:var(--text4);margin:4px 0 9px}
.btn{display:block;width:100%;padding:13px;background:var(--accent);color:#fff;border:none;border-radius:10px;font-size:15px;font-weight:600;text-align:center}
.btn:active{opacity:.85}
.btn-ghost{background:var(--surface);border:1px solid var(--border);color:var(--accent);border-radius:10px;padding:11px 16px;font-size:14px;font-weight:600}
.btn-sm{padding:8px 12px;border-radius:8px;font-size:13px;font-weight:600;border:none}
.btn-danger{background:var(--danger-bg);color:var(--danger)}.btn-warn{background:var(--warn-bg);color:var(--warn)}.btn-success{background:var(--success-bg);color:var(--success)}.btn-muted{background:var(--bg);color:var(--text3);border:1px solid var(--border)}.btn-accent{background:var(--accent-bg);color:var(--accent);border:none}
.day-row{background:var(--surface);border:1px solid var(--border);border-radius:11px;padding:12px 13px;margin-bottom:7px;display:flex;align-items:center;gap:10px}
.day-row.cur{border-color:var(--accent);background:var(--accent-light)}.day-row.locked{opacity:.38}
.dot{width:30px;height:30px;border-radius:50%;display:flex;align-items:center;justify-content:center;flex-shrink:0;font-size:13px;font-weight:700}
.dot-done{background:var(--success-bg);color:var(--success)}.dot-cur{background:var(--accent-bg);color:var(--accent)}.dot-future{background:var(--bg);color:var(--text4)}.dot-weak{background:var(--warn-bg);color:var(--warn)}
.day-info{flex:1;min-width:0}.day-topic{font-size:14px;font-weight:600;color:var(--text)}.day-meta{font-size:12px;color:var(--text4);margin-top:1px}.day-note{font-size:12px;color:var(--success);margin-top:2px;font-style:italic;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.tag{font-size:10px;font-weight:700;padding:3px 8px;border-radius:20px;flex-shrink:0}.tag-now{color:var(--accent);background:var(--accent-bg)}.tag-weak{color:var(--warn);background:var(--warn-bg)}.tag-review{color:var(--danger);background:var(--danger-bg)}
.read-item{display:flex;gap:9px;margin-bottom:10px;align-items:flex-start}.read-num{width:22px;height:22px;border-radius:50%;background:var(--bg);display:flex;align-items:center;justify-content:center;flex-shrink:0;font-size:11px;font-weight:700;color:var(--text4);margin-top:1px}.read-lbl{font-size:14px;color:var(--text2);line-height:1.45;flex:1}.read-lbl a{color:var(--accent)}.yt-badge{font-size:10px;background:#FF0000;color:#fff;padding:1px 5px;border-radius:3px;font-weight:700;vertical-align:middle;margin-left:4px}
.asgn{margin-bottom:15px}.asgn-lbl{font-size:11px;font-weight:700;letter-spacing:.07em;text-transform:uppercase;color:var(--text4);margin-bottom:7px}.asgn-body{font-size:14px;color:var(--text2);line-height:1.65}
.hw-q{display:flex;gap:9px;margin-bottom:8px;align-items:flex-start}.hw-n{font-size:13px;font-weight:700;color:var(--accent);width:24px;flex-shrink:0;margin-top:2px}
.day-note-inp{width:100%;padding:10px 11px;border:1px solid var(--border);border-radius:9px;font-size:14px;color:var(--text);resize:none;background:var(--input-bg);outline:none;line-height:1.5;margin-bottom:9px}.day-note-inp:focus{border-color:var(--accent)}
.week-grid{display:grid;grid-template-columns:repeat(5,1fr);gap:6px;margin-bottom:13px}.wc{background:var(--surface);border:1px solid var(--border);border-radius:10px;padding:9px 4px;text-align:center}.wc.done{background:var(--success-bg);border-color:#A8DFC0}.wc.cur{border-color:var(--accent);background:var(--accent-light)}.wc.weak{border-color:#FFD080;background:var(--warn-bg)}.wc-num{font-size:10px;font-weight:700;color:var(--text4);margin-bottom:2px}.wc-title{font-size:10px;color:var(--text2);font-weight:600;line-height:1.3}.wc-conf{font-size:11px;margin-top:3px}
.stats{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:13px}.stat{background:var(--surface);border:1px solid var(--border);border-radius:11px;padding:13px 10px;text-align:center}.stat-v{font-size:26px;font-weight:700;color:var(--accent);letter-spacing:-.02em}.stat-l{font-size:10px;color:var(--text4);font-weight:600;letter-spacing:.06em;text-transform:uppercase;margin-top:2px}
.cal-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:3px;margin-bottom:13px}.cal-lbl{font-size:9px;font-weight:700;text-align:center;color:var(--text4);text-transform:uppercase;padding:3px 0}.cal-d{height:30px;border-radius:7px;display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:600}.cal-studied{background:var(--accent);color:#fff}.cal-today{border:2px solid var(--accent);color:var(--accent)}.cal-normal{background:var(--bg);color:var(--text4)}.cal-empty{color:transparent}
.q-option{width:100%;text-align:left;padding:13px;margin-bottom:7px;background:var(--surface);border:1px solid var(--border);border-radius:11px;font-size:14px;color:var(--text);line-height:1.45;display:flex;align-items:flex-start;gap:10px}.q-option:active{background:var(--accent-light)}.q-option.correct{background:var(--success-bg);border-color:#7ECFA8}.q-option.wrong{background:var(--danger-bg);border-color:#F0AAAA}.q-option.show-correct{background:var(--success-bg);border-color:#7ECFA8}.q-letter{width:24px;height:24px;border-radius:50%;background:var(--bg);display:inline-flex;align-items:center;justify-content:center;flex-shrink:0;margin-top:1px;font-size:11px;font-weight:700;color:var(--text4)}.q-option.correct .q-letter,.q-option.show-correct .q-letter{background:var(--success);color:#fff}.q-option.wrong .q-letter{background:var(--danger);color:#fff}
.exp-box{background:var(--bg);border:1px solid var(--border);border-radius:10px;padding:12px;margin-top:4px}.exp-lbl{font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.06em;color:var(--text4);margin-bottom:5px}.exp-txt{font-size:14px;color:var(--text2);line-height:1.6}
.save-word-btn{display:inline-flex;align-items:center;gap:4px;padding:5px 10px;background:var(--accent-bg);color:var(--accent);border:none;border-radius:6px;font-size:12px;font-weight:600;cursor:pointer;margin-top:7px}
.log-card{background:var(--surface);border:1px solid var(--border);border-radius:12px;padding:13px;margin-bottom:9px}.log-date{font-size:11px;font-weight:700;letter-spacing:.07em;text-transform:uppercase;color:var(--text4);margin-bottom:8px}.log-fl{margin-bottom:7px}.log-fl-lbl{font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.06em;margin-bottom:3px}.log-fl-val{font-size:14px;color:var(--text);line-height:1.5}.real-miss-badge{background:var(--danger-bg);border:1px solid #FFAAAA;border-radius:20px;padding:2px 8px;font-size:11px;font-weight:700;color:var(--danger);display:inline-block;margin-bottom:6px}
.search-wrap{position:relative;margin-bottom:11px}.search-inp{width:100%;padding:10px 12px 10px 36px;border:1px solid var(--border);border-radius:10px;font-size:14px;background:var(--surface);outline:none;color:var(--text)}.search-inp:focus{border-color:var(--accent)}.search-ico{position:absolute;left:11px;top:50%;transform:translateY(-50%);color:var(--text4)}
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.55);display:flex;align-items:flex-end;z-index:100}.modal-sheet{background:var(--surface);border-radius:20px 20px 0 0;padding:20px 15px 36px;width:100%;max-width:480px;margin:0 auto;max-height:92vh;overflow-y:auto}.modal-title{font-size:16px;font-weight:700;color:var(--text);margin-bottom:4px}.modal-sub{font-size:14px;color:var(--text3);margin-bottom:13px;line-height:1.5}
.form-field{margin-bottom:11px}.form-lbl{font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.06em;color:var(--text4);margin-bottom:5px;display:block}.form-ta{width:100%;padding:10px 11px;border:1px solid var(--border);border-radius:9px;font-size:14px;color:var(--text);resize:vertical;background:var(--input-bg);outline:none;line-height:1.5}.form-ta:focus,.form-in:focus{border-color:var(--accent)}.form-in{width:100%;padding:10px 11px;border:1px solid var(--border);border-radius:9px;font-size:15px;color:var(--text);background:var(--input-bg);outline:none}
.stars{display:flex;gap:8px;margin-bottom:13px}.star{font-size:28px;cursor:pointer;user-select:none}
.review-banner{background:var(--warn-bg);border:1px solid #FFD699;border-radius:10px;padding:10px 12px;margin-bottom:11px;display:flex;align-items:center;gap:8px;font-size:13px;color:#8A5A00;line-height:1.4}
.scenario-txt{font-size:14px;color:var(--text);line-height:1.7;background:var(--bg);border-radius:9px;padding:13px;margin-bottom:13px;border-left:3px solid var(--accent)}
.grade-result{border-radius:10px;padding:12px;margin-bottom:11px;font-size:14px;line-height:1.65}.grade-pass{background:var(--success-bg);border:1px solid #A8DFC0;color:#0A4A2A}.grade-partial{background:var(--warn-bg);border:1px solid #FFD080;color:#6A3A00}.grade-fail{background:var(--danger-bg);border:1px solid #F0AAAA;color:#6A0000}.dark .grade-pass{color:#8AE8B8}.dark .grade-partial{color:#FFD080}.dark .grade-fail{color:#F0AAAA}.grade-lbl{font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.07em;margin-bottom:5px}
.divider{height:1px;background:var(--border);margin:11px 0}
.loading-dots{display:inline-flex;gap:4px;align-items:center}.loading-dots span{width:6px;height:6px;border-radius:50%;background:var(--accent);animation:db .6s infinite alternate}.loading-dots span:nth-child(2){animation-delay:.2s}.loading-dots span:nth-child(3){animation-delay:.4s}
@keyframes db{from{opacity:.3;transform:scale(.8)}to{opacity:1;transform:scale(1)}}
.diff{font-size:10px;font-weight:700;padding:2px 7px;border-radius:20px}.diff-easy{background:var(--success-bg);color:var(--success)}.diff-medium{background:var(--warn-bg);color:var(--warn)}.diff-hard{background:var(--danger-bg);color:var(--danger)}
.qr-card{background:var(--surface);border:1px solid var(--border);border-radius:11px;overflow:hidden;margin-bottom:8px}.qr-hdr{padding:12px 13px;display:flex;justify-content:space-between;align-items:center;cursor:pointer}.qr-hdr:active{background:var(--bg)}.qr-title{font-size:14px;font-weight:600;color:var(--text)}.qr-tag{font-size:10px;font-weight:700;padding:2px 7px;border-radius:10px;background:var(--accent-bg);color:var(--accent)}.qr-body{display:none;padding:0 13px 13px;font-size:14px;color:var(--text2);line-height:1.7;border-top:1px solid var(--border)}.qr-body.open{display:block}
.gloss-item{background:var(--surface);border:1px solid var(--border);border-radius:11px;padding:12px 13px;margin-bottom:7px}.gloss-word{font-size:15px;font-weight:700;color:var(--text);margin-bottom:3px}.gloss-ctx{font-size:12px;color:var(--text4);font-style:italic;margin-bottom:6px}.gloss-def{font-size:14px;color:var(--text2);line-height:1.6}.gloss-pending{border-color:var(--warn)}
.weak-row{background:var(--surface);border:1px solid var(--border);border-radius:10px;padding:11px 13px;margin-bottom:7px;display:flex;justify-content:space-between;align-items:center;gap:10px}.weak-topic{font-size:14px;font-weight:600;color:var(--text)}.weak-bar-wrap{height:4px;background:var(--bg);border-radius:3px;margin-top:4px}.weak-bar-fill{height:100%;border-radius:3px}
.today-summary{padding:13px 14px}.today-pill{display:inline-block;background:var(--accent-bg);color:var(--accent);border-radius:20px;padding:4px 10px;font-size:12px;font-weight:600;margin-bottom:10px}.today-preview{font-size:14px;color:var(--text3);line-height:1.5;margin-bottom:13px}
.notes-all-card{background:var(--surface);border:1px solid var(--border);border-radius:11px;padding:12px 13px;margin-bottom:7px}.note-entry-source{font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.07em;color:var(--text4);margin-bottom:4px}.note-entry-text{font-size:14px;color:var(--text2);line-height:1.5}
</style>
</head>
<body>
<div class="app" id="app">
  <div class="hdr">
    <div class="hdr-top">
      <div><div class="hdr-sub">Advisory Compliance</div><div class="hdr-title">Wallcross</div></div>
      <div class="badges">
        <div class="b-streak">🔥<span id="streak-val">0</span></div>
        <div class="b-dark" onclick="toggleDark()" id="dark-btn">🌙</div>
      </div>
    </div>
    <div id="assess-bar"></div>
    <div class="prog-bar"><div class="prog-fill" id="prog-fill" style="width:0%"></div></div>
    <div class="tabs">
      <button class="tab on" onclick="sw('today')" id="tab-today"><svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M4 19.5A2.5 2.5 0 0 1 6.5 17H20"/><path d="M6.5 2H20v20H6.5A2.5 2.5 0 0 1 4 19.5v-15A2.5 2.5 0 0 1 6.5 2z"/></svg>Dashboard</button>
      <button class="tab" onclick="sw('progress')" id="tab-progress"><svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="18" y1="20" x2="18" y2="10"/><line x1="12" y1="20" x2="12" y2="4"/><line x1="6" y1="20" x2="6" y2="14"/></svg>Progress</button>
      <button class="tab" onclick="sw('cases')" id="tab-cases"><svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="2" y="3" width="20" height="14" rx="2"/><line x1="8" y1="21" x2="16" y2="21"/><line x1="12" y1="17" x2="12" y2="21"/></svg>Cases</button>
      <button class="tab" onclick="sw('log')" id="tab-log"><svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/></svg>Log</button>
      <button class="tab" onclick="sw('quiz')" id="tab-quiz"><svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><path d="M9.09 9a3 3 0 0 1 5.83 1c0 2-3 3-3 3"/><line x1="12" y1="17" x2="12.01" y2="17"/></svg>Quiz</button>
      <button class="tab" onclick="sw('ref')" id="tab-ref"><svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polygon points="12 2 15.09 8.26 22 9.27 17 14.14 18.18 21.02 12 17.77 5.82 21.02 7 14.14 2 9.27 8.91 8.26 12 2"/></svg>Ref</button>
      <button class="tab" onclick="sw('notes')" id="tab-notes"><svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"/><path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"/></svg>Notes</button>
      <button class="tab" onclick="sw('glossary')" id="tab-glossary"><svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/></svg>Words</button>
    </div>
  </div>
  <div class="body" id="body"></div>
</div>
<script>

// ── Data ──────────────────────────────────────────────────────────────────────
const TOTAL=200;
const ASSESSMENTS=[{week:6,label:"IB Products"},{week:14,label:"Real Assets & Trade"},{week:26,label:"Regulatory Frameworks"},{week:34,label:"Securitized Products"},{week:39,label:"SME Scenarios"}];
const PHASES=[
  {id:1,label:"Phase 1",title:"IB Products Foundation",weeks:"1–6",color:"#4B3FBF"},
  {id:2,label:"Phase 2",title:"Real Assets & Structured Finance",weeks:"7–10",color:"#0A6B55"},
