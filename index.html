function flagQ(id){if(!S.flaggedQs.includes(id))S.flaggedQs.push(id);sv();render();}
function unflagQ(id){S.flaggedQs=S.flaggedQs.filter(x=>x!==id);sv();render();}

async function gradeCase(){
  const resp=document.getElementById('case-response')?.value?.trim();
  if(!resp||resp.length<30){alert('Please write a more complete response before submitting.');return;}
  S.caseState.userResponse=resp;S.caseState.loading=true;render();
  try{
    const res=await fetch('https://api.anthropic.com/v1/messages',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({model:'claude-sonnet-4-20250514',max_tokens:1000,system:`You are a senior compliance officer at a global investment bank with 20 years of advisory compliance experience. You are grading a junior compliance officer's response to a realistic advisory scenario. The candidate is in the early stages of a structured self-study program. Be direct, specific, and constructive. Grade as: "pass" (covers key issues well), "partial" (right instincts but misses important elements), or "fail" (misses critical issues or gets something materially wrong). Respond ONLY with a JSON object — no other text:\n{"grade":"pass"|"partial"|"fail","feedback":"2-3 sentence assessment naming specific concepts and rules they should have mentioned","modelAnswer":"Clear 150-200 word model answer covering all key issues a senior compliance officer would raise. Use plain language."}`,messages:[{role:'user',content:`SCENARIO: ${S.caseState.scenario.title}\n\n${S.caseState.scenario.text}\n\nCANDIDATE'S RESPONSE:\n${resp}`}]})});
    const data=await res.json();const text=data.content?.find(c=>c.type==='text')?.text||'{}';const result=JSON.parse(text.replace(/```json|```/g,'').trim());
    S.caseState.gradeResult=result;S.caseState.loading=false;
    S.quizHistory.push({score:result.grade==='pass'?1:result.grade==='partial'?0.5:0,total:1,date:new Date().toLocaleDateString(),topic:S.caseState.scenario.topic,caseGrade:result.grade,scenarioTitle:S.caseState.scenario.title});
    sv();render();
  }catch(err){S.caseState.loading=false;S.caseState.gradeResult={grade:'partial',feedback:'Unable to connect to grading service. Check your connection and try again.',modelAnswer:''};render();}
}

function saveToLog(){const cs=S.caseState;if(!cs.scenario||!cs.gradeResult)return;S.advisoryLog.unshift({objective:`[Case: ${cs.scenario.title}] ${cs.scenario.text.substring(0,100)}...`,risk:cs.gradeResult.feedback,path:cs.gradeResult.modelAnswer||cs.userResponse,notes:`Grade: ${cs.gradeResult.grade}. My response: ${cs.userResponse.substring(0,200)}...`,date:new Date().toLocaleDateString()});sv();S.caseState={scenario:null,userResponse:'',gradeResult:null,loading:false};S.tab='log';render();}

  h+=`<div style="display:flex;gap:3px;margin-bottom:13px">`;qz.questions.forEach((_,i)=>{const a=qz.answers[i];h+=`<div style="flex:1;height:3px;border-radius:2px;background:${a===undefined?'var(--border)':a===qz.questions[i].correct?'var(--success)':'var(--danger)'}"></div>`;});h+=`</div>`;
  h+=`<div class="card" style="margin-bottom:11px"><div style="padding:14px"><div style="font-size:15px;font-weight:600;line-height:1.55;color:var(--text)">${q.q}</div>${q.ai?`<div style="font-size:11px;color:var(--text4);margin-top:5px">✨ AI-generated</div>`:''}</div></div>`;
  q.opts.forEach((opt,i)=>{const isC=answered&&i===q.correct,isW=answered&&sel===i&&i!==q.correct,isSC=answered&&i===q.correct&&sel!==i;h+=`<button class="q-option ${isC?'correct':isW?'wrong':isSC?'show-correct':''}" ${answered?'disabled':`onclick="answerQ(${i})"`}><span class="q-letter">${String.fromCharCode(65+i)}</span>${opt}</button>`;});
  if(answered){
    const safeCtx=(q.topic+' — '+q.q.substring(0,40)).replace(/'/g,'&#39;').replace(/"/g,'&quot;');
    h+=`<div class="exp-box"><div class="exp-lbl">Explanation</div><div class="exp-txt">${q.exp}</div>
    <button class="save-word-btn" onclick="openSaveWord('${safeCtx}')">+ Save a word from this explanation</button>
    </div>`;
    const fl=S.flaggedQs.includes(q.id);
    h+=`<div style="display:flex;gap:8px;margin-top:10px"><button class="btn-sm ${fl?'btn-success':'btn-warn'}" style="flex:1" onclick="${fl?`unflagQ(${q.id})`:`flagQ(${q.id})`}">${fl?'🏳 Unflag':'🚩 Flag'}</button><button class="btn" style="flex:2;padding:12px" onclick="nextQ()">${qz.current<qz.questions.length-1?'Next →':'See results'}</button></div>`;
  }
  return h;
}

// AI question generation
async function generateAIQuestions(){
  if(!S.aiQuestions)S.aiQuestions=[];
  S.quizMode='generating';render();
  const done=Object.keys(S.completedDays).filter(k=>S.completedDays[k]).map(Number);
  const topics=[...new Set(DAYS.filter(d=>done.includes(d.day)).map(d=>d.topic))];
  try{
    const res=await fetch('https://api.anthropic.com/v1/messages',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({model:'claude-sonnet-4-20250514',max_tokens:2000,system:`You are an expert compliance trainer for investment banking. Generate 5 multiple-choice quiz questions for an advisory compliance professional studying: ${topics.join(', ')}. Test practical compliance judgment, not just definitions. Vary difficulty. Return ONLY a JSON array:
[{"topic":"topic","day":1,"q":"question","opts":["A","B","C","D"],"correct":0,"exp":"explanation"}]`,messages:[{role:'user',content:`Generate 5 fresh compliance quiz questions covering: ${topics.slice(-4).join(', ')}. Focus on practical scenarios and judgment calls. Don't duplicate: ${QUIZ_BANK.map(q=>q.q.substring(0,30)).join('; ')}`}]})});
    const data=await res.json();const text=data.content?.find(c=>c.type==='text')?.text||'[]';
    const newQs=JSON.parse(text.replace(/\`\`\`json|\`\`\`/g,'').trim());
    const withIds=newQs.map((q,i)=>({...q,id:`ai_${Date.now()}_${i}`,ai:true}));
    S.aiQuestions=[...S.aiQuestions,...withIds];
    try{localStorage.setItem('aiQuestions',JSON.stringify(S.aiQuestions));}catch{}
    S.quizMode='start';render();startQuiz('random');
  }catch(e){S.quizMode='start';render();alert('Unable to generate questions. Check your connection.');}
}

// Override startQuiz to use combined bank
const _origStartQuiz = startQuiz;
function startQuiz(mode){
  const allBank=[...QUIZ_BANK,...(S.aiQuestions||[])];
  let pool;
  if(mode==='flagged'){pool=S.flaggedQs.map(id=>allBank.find(q=>q.id===id)).filter(Boolean);}
  else{const done=Object.keys(S.completedDays).filter(k=>S.completedDays[k]).map(Number);pool=allBank.filter(q=>done.includes(q.day));}
  if(pool.length<5){alert('Not enough questions available yet.');return;}
  const qs=[...pool].sort(()=>Math.random()-.5).slice(0,Math.min(10,pool.length));
  S.quiz={questions:qs,current:0,answers:{},done:false};render();
}

// ── QUICK LOOKUP ─────────────────────────────────────────────────────────────
async function quickLookup(query){
  if(!query||query.trim().length<5){alert('Please describe the situation in a bit more detail.');return;}
  const btn=document.getElementById('ql-btn');
  const out=document.getElementById('ql-output');
  if(btn){btn.textContent='Looking up...';btn.disabled=true;}
  if(out){out.innerHTML=`<div style="text-align:center;padding:16px 0"><div class="loading-dots" style="justify-content:center"><span></span><span></span><span></span></div></div>`;}
  try{
    const res=await fetch('https://api.anthropic.com/v1/messages',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({model:'claude-sonnet-4-20250514',max_tokens:600,system:`You are a senior advisory compliance officer at a global investment bank. A junior colleague has described a situation and needs an immediate, structured response. Be concise and practical — this is a quick reference, not a full analysis. Return ONLY a JSON object:
{"issue":"1 sentence identifying the core compliance issue","rule":"The primary rule or framework that applies (e.g. MNPI/Rule 10b-5, FINRA Rule 2210, Reg RR, Volcker Rule, etc.)","whatToSay":"2-3 sentences of what to actually say or do right now","watchOut":"1 sentence — the thing most people miss in this situation"}`,messages:[{role:'user',content:`Situation: ${query}`}]})});
    const data=await res.json();
    const text=data.content?.find(c=>c.type==='text')?.text||'{}';
    const r=JSON.parse(text.replace(/\`\`\`json|\`\`\`/g,'').trim());
    if(out){out.innerHTML=`
      <div style="margin-bottom:10px"><div style="font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.07em;color:var(--danger);margin-bottom:3px">Issue</div><div style="font-size:14px;color:var(--text);line-height:1.5">${r.issue||'—'}</div></div>
      <div style="margin-bottom:10px"><div style="font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.07em;color:var(--warn);margin-bottom:3px">Rule / Framework</div><div style="font-size:14px;color:var(--text);line-height:1.5">${r.rule||'—'}</div></div>
      <div style="margin-bottom:10px"><div style="font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.07em;color:var(--success);margin-bottom:3px">What to do / say</div><div style="font-size:14px;color:var(--text);line-height:1.7">${r.whatToSay||'—'}</div></div>
      <div style="background:var(--warn-bg);border:1px solid #FFD699;border-radius:8px;padding:10px 12px"><div style="font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.07em;color:var(--warn);margin-bottom:3px">⚠ Watch out for</div><div style="font-size:13px;color:var(--text2);line-height:1.5">${r.watchOut||'—'}</div></div>
      <button class="btn-sm btn-muted" style="width:100%;margin-top:10px;padding:9px" onclick="saveQLToLog('${query.replace(/'/g,"&#39;")}','${(r.issue||'').replace(/'/g,"&#39;")}','${(r.whatToSay||'').replace(/'/g,"&#39;")}')">Save to advisory log</button>
    `;}
  }catch(e){
    if(out)out.innerHTML=`<div style="font-size:13px;color:var(--danger)">Unable to connect. Check your connection and try again.</div>`;
  }
  if(btn){btn.textContent='Look up';btn.disabled=false;}
}

function saveQLToLog(query,issue,path){
  S.advisoryLog.unshift({objective:query,risk:issue,path:path,notes:'Quick lookup result',date:new Date().toLocaleDateString()});
  sv();

  if(out){const msg=document.createElement('div');msg.style.cssText='font-size:13px;color:var(--success);font-weight:600;margin-top:8px;text-align:center';msg.textContent='Saved to advisory log ✓';out.appendChild(msg);setTimeout(()=>msg.remove(),2000);}
}


// ── PHASE UNLOCK ─────────────────────────────────────────────────────────────
function checkPhaseUnlock(dayId){
  const phaseEndDays={6:1, 10:1, 15:2, 20:2};  // day -> phase just completed
  if(phaseEndDays[dayId]){
    const phase=phaseEndDays[dayId];
    const nextPhase=PHASES[phase];  // 0-indexed
    if(nextPhase){
      setTimeout(()=>{
        S.modal={type:'phaseunlock',phase:phase,nextPhase:nextPhase};
        render();
      },400);
    }
  }
}

// Rate AI quiz questions
function rateAIQuestion(id, good){
  if(!good){
    S.aiQuestions = (S.aiQuestions||[]).filter(q=>q.id!==id);

    try{localStorage.setItem('aiQuestions',JSON.stringify(S.aiQuestions));}catch{}
    const msg=document.createElement('div');msg.style.cssText='position:fixed;bottom:80px;left:50%;transform:translateX(-50%);background:#1A1A1A;color:#fff;padding:8px 16px;border-radius:20px;font-size:13px;z-index:200';msg.textContent='Question removed ✓';document.body.appendChild(msg);setTimeout(()=>msg.remove(),2000);
  } else {
    const q=(S.aiQuestions||[]).find(x=>x.id===id);if(q)q.rated=true;
    try{localStorage.setItem('aiQuestions',JSON.stringify(S.aiQuestions));}catch{}
  }
}
