const QUIZ_BANK=[
  {id:1,topic:"DCM",day:1,q:"In a typical DCM deal, the bank acts as:",opts:["Principal — buys bonds outright","Agent / underwriter — helps the issuer sell bonds to investors","Advisor only — no distribution role","Trustee — holds bonds on behalf of investors"],correct:1,exp:"In most DCM deals the bank acts as underwriter/bookrunner — an agent. Principal positions (bought deals) create different conflict and disclosure obligations."},
  {id:2,topic:"DCM",day:1,q:"At what point does issuer information typically become MNPI?",opts:["Only after the deal closes","From the moment the bank receives the mandate and non-public financials","Only during the roadshow","When the prospectus is filed publicly"],correct:1,exp:"MNPI risk arises as soon as the bank receives non-public information from the issuer — typically at mandate, well before announcement."},
  {id:3,topic:"DCM",day:1,q:"A banker discusses the issuer's credit profile with a hedge fund before announcement. Primary concern?",opts:["None — pre-marketing is standard","Selective disclosure of MNPI — gives the investor an unfair trading advantage","Only a concern if the fund actually trades","A conflict of interest but not MNPI"],correct:1,exp:"The violation occurs at the point of disclosure — not when or whether the investor trades."},
  {id:4,topic:"LevFin",day:2,q:"In an LBO, the key information barrier concern is:",opts:["Share price may move before announcement","PE sponsor may demand preferential terms","Bank staff receive MNPI about the target that must be walled off from any desk that trades in the target","LBO may violate Volcker Rule"],correct:2,exp:"When the bank advises on or finances an LBO, non-public information about the target must be walled off from any trading desk."},
  {id:5,topic:"LevFin",day:2,q:"A HY presentation calls margins 'manageable' but omits that they've deteriorated. This implicates:",opts:["Volcker Rule","Fair, balanced, not misleading standard — omitting material negative info can make a document misleading","Anti-boycott regulations","15a-6 cross-border exemption"],correct:1,exp:"A document can be accurate but misleading if it omits material negative information. Regulators assess the overall impression."},
  {id:6,topic:"ECM",day:3,q:"Primary purpose of a quiet period:",opts:["Allow the company to prepare financials","Prevent statements conditioning the market or constituting an illegal offer before the prospectus is effective","Give investors time to review the prospectus","Restrict trading after listing"],correct:1,exp:"The quiet period prevents gun-jumping — premature communications that could constitute an illegal offer."},
  {id:7,topic:"ECM",day:3,q:"What is gun-jumping?",opts:["Pricing an IPO above the range","Making public statements or offers before the registration statement is effective","Allocating shares before bookbuilding closes","Trading before lock-up expires"],correct:1,exp:"Gun-jumping refers to premature communications that condition the market. The SEC can delay or invalidate an offering."},
  {id:8,topic:"144A/Reg S",day:4,q:"A QIB under Rule 144A must generally:",opts:["Be a registered broker-dealer","Own and invest at least $100M in securities of non-affiliated issuers on a discretionary basis","Be a sovereign wealth fund","Have minimum AUM of $1 billion"],correct:1,exp:"The $100M threshold is about securities owned and invested on a discretionary basis — not total AUM."},
  {id:9,topic:"144A/Reg S",day:4,q:"Reg S applies to securities offerings made:",opts:["Inside the US to institutions","Outside the US, exempting them from SEC registration","Only to sovereign wealth funds","To LATAM retail investors only"],correct:1,exp:"Reg S exempts securities offered and sold outside the US to non-US persons. A typical deal combines 144A and Reg S."},
  {id:10,topic:"Mktg Materials",day:5,q:"Core standard under FINRA Rule 2210:",opts:["Approved by legal before distribution","Fair, balanced, and not misleading","Reviewed by CEO before sending","No longer than 20 pages"],correct:1,exp:"FINRA Rule 2210 requires communications be fair, balanced, and not misleading. 'Not misleading' includes material omissions."},
  {id:11,topic:"Mktg Materials",day:5,q:"A boilerplate disclaimer does not cure a misleading document because:",opts:["Disclaimers always provide full legal protection","Regulators assess the overall impression — a small-print disclaimer does not offset a structurally misleading document","Only relevant for retail investors","Disclaimers need to be in bold"],correct:1,exp:"Regulators look at the overall impression on a reasonable investor — not just whether a disclaimer exists. This is 'disclaimer-washing.'"},
  {id:12,topic:"ASF",day:6,q:"When a bank both advises on and finances an acquisition, the conflict is:",opts:["It cannot legally perform both","Its interest in the lending mandate may compromise advisory independence","Advisory and lending always need separate legal entities","There is no conflict"],correct:1,exp:"The bank's financial interest in the lending outcome can skew advisory judgment. Compliance must identify and manage this conflict."},
  {id:13,topic:"ASF",day:6,q:"Information barriers in M&A must be erected:",opts:["Only after public announcement","As soon as the bank receives MNPI about the target — at or before mandate","Only when trading desks request access","At closing"],correct:1,exp:"MNPI arrives at or before mandate. Waiting until announcement exposes the firm to insider trading liability for trading in the interim."},
  {id:14,topic:"Secondary Loans",day:9,q:"Key difference between loan assignment and participation:",opts:["They are the same thing","Assignment: buyer becomes lender of record. Participation: buyer gets economic interest only, seller remains lender of record","Assignments only for investment-grade loans","Participations always require borrower consent"],correct:1,exp:"In assignment the buyer becomes a direct party to the loan. In participation, economic risk transfers but the original lender retains the legal relationship."},
  {id:15,topic:"Secondary Loans",day:9,q:"A big boy letter is:",opts:["Borrower consent to transfer","Buyer acknowledges seller may hold MNPI and agrees to proceed — waiving information asymmetry claims but NOT fraud","A Federal Reserve regulatory filing","A commitment letter confirming credit capacity"],correct:1,exp:"Big boy letters do not protect against fraud. If the seller actively misrepresents information, the letter provides no defence."},
  {id:16,topic:"Convertibles",day:8,q:"A hedge fund is wall-crossed at 10am. Deal announced 4pm. Fund sold shares at 2pm. Primary concern:",opts:["None — acting on own judgment","Traded while in possession of MNPI — the convertible deal is material and non-public, meaning the short sale may constitute insider trading","Only if the fund profited","A conflict but not insider trading"],correct:1,exp:"This is a classic convertible bond insider trading scenario. The SEC has brought numerous enforcement actions on exactly this fact pattern."},
],
  {id:17,topic:"Aviation Finance",day:11,q:"What makes aviation finance compliance-distinct from standard corporate lending?",opts:["No difference — aviation is treated identically to corporate debt","The cross-border nature of aircraft creates sanctions and export control dimensions not present in domestic corporate lending","Aviation is exempt from most financial regulations","Aircraft loans are always publicly listed securities"],correct:1,exp:"Aircraft cross international borders and are registered in multiple jurisdictions. This creates sanctions exposure, export control obligations for US-manufactured aircraft, and cross-border complexity that standard corporate deals don't have."},
  {id:18,topic:"CMBS",day:13,q:"What is the purpose of the Reg RR risk retention rule in securitization?",opts:["To prevent banks from issuing too many securities","To require originators to retain 5% of credit risk — aligning their incentives with investors so they don't originate bad loans just to sell them off","To limit the size of individual tranches","To require CMBS to be rated by two agencies"],correct:1,exp:"Reg RR addresses the originate-to-distribute problem from 2008. Originators had no incentive to maintain credit standards if selling all risk to investors. The 5% retention requirement realigns incentives."},
  {id:19,topic:"CLOs",day:17,q:"How does the Volcker Rule currently treat CLOs?",opts:["CLOs are fully prohibited — banks cannot invest in them","CLOs backed primarily by loans qualify for the loan securitization exclusion from the covered fund definition — banks can invest and sponsor them within limits","CLOs are treated as proprietary trading positions","Banks can invest in CLOs freely with no restrictions"],correct:1,exp:"The loan securitization exclusion means CLOs backed primarily by loans (not bonds) fall outside the covered fund definition. The distinction between loan CLOs and bond CLOs is practically important for Volcker compliance."},
  {id:20,topic:"Restructuring",day:18,q:"Why is MNPI in restructuring more sensitive than in standard M&A?",opts:["It isn't — the rules are identical","In restructuring, information is more material, the circle of holders is larger and harder to control, and secondary market trading of distressed debt is active — creating more misuse opportunities","Restructuring deals are always public so MNPI rules don't apply","Different rules apply to restructuring"],correct:1,exp:"Distressed situations involve many creditors and advisors holding sensitive non-public information while the company's loans and bonds actively trade. This combination — wide distribution plus active trading — creates far more MNPI risk than a tightly controlled M&A deal."},
  {id:21,topic:"Credit Portfolio",day:19,q:"When a bank buys CDS protection on a borrower it has lent to, the primary compliance concern is:",opts:["None — hedging credit risk is always permitted","The bank may hold MNPI from its lending relationship — buying CDS using that information could constitute trading on MNPI","CDS trading is prohibited by the Volcker Rule","The bank must notify the borrower before buying CDS"],correct:1,exp:"As a lender, the bank receives ongoing non-public financial information. Using that to buy CDS protection — effectively betting on credit deterioration — may constitute MNPI trading. Credit portfolio management must be walled off from lender-side information."},
{id:22,topic:"Trade Finance",day:21,q:"Why are letters of credit particularly vulnerable to trade-based money laundering?",opts:["They aren't — LCs are one of the most secure instruments","Because they rely on documents rather than actual inspection of goods — creating opportunities to misrepresent the nature, quantity, or value of goods being traded","Because LCs are always issued in cash","Because LCs bypass all sanctions screening"],correct:1,exp:"Trade-based money laundering exploits the document-based nature of LCs. By over- or under-invoicing, misrepresenting goods, or using fictitious transactions, criminals can move value across borders using LCs that appear legitimate on their face. This is why LC compliance requires scrutiny of the underlying trade, not just the documents."},
  {id:23,topic:"Sanctions / Trade",day:22,q:"What is the OFAC 50% rule?",opts:["Banks must screen 50% of their transactions for sanctions","An entity is considered blocked if 50% or more of its ownership is held by a blocked person or entity — even if the entity itself does not appear on the SDN list","OFAC requires 50 days notice before sanctions are imposed","50% of sanctions fines go to the whistleblower"],correct:1,exp:"The 50% rule means you cannot simply screen against the SDN list and stop there. If a blocked person owns 50% or more of an entity, that entity is also considered blocked regardless of whether it appears on any list. In complex deal structures with multiple layers of ownership, tracing through to the ultimate beneficial owner is essential."},
  {id:24,topic:"Anti-Boycott",day:23,q:"Under US anti-boycott law, when a client submits an LC with a clause stating goods must not be of Israeli origin, the bank must:",opts:["Refuse to issue the LC entirely","Issue the LC — the bank is just following client instructions","Report the request to the Bureau of Industry and Security (BIS) and refuse to comply with the boycott provision","Only report if the transaction exceeds $1 million"],correct:2,exp:"US anti-boycott law requires two things: (1) refuse to comply with the boycott provision (cannot include origin restrictions in the LC) and (2) report the request to BIS. The reporting obligation applies regardless of whether the bank complied with the boycott request — the request itself must be reported."},
  {id:25,topic:"Green Finance",day:27,q:"What are the four core components of the ICMA Green Bond Principles?",opts:["Pricing, marketing, distribution, and settlement","Use of proceeds, process for project evaluation, management of proceeds, and reporting","Green certification, independent verification, annual audit, and public disclosure","Issuer eligibility, project type, carbon offset, and investor consent"],correct:1,exp:"The ICMA Green Bond Principles have four pillars: (1) use of proceeds must be for eligible green projects; (2) a process for evaluating and selecting projects; (3) management of proceeds in a tracked, ring-fenced account; and (4) annual reporting on use of proceeds and environmental impact. These are voluntary guidelines but have become the market standard."},
  {id:26,topic:"MNPI",day:29,q:"What is the reasonable investor test for materiality?",opts:["Information is material if it causes a 10% or more move in the share price","Information is material if there is a substantial likelihood that a reasonable investor would consider it important in making an investment decision","Information is material only if it relates to earnings","Information is material if senior management considers it confidential"],correct:1,exp:"The reasonable investor test (from Basic Inc. v. Levinson) asks whether there is a substantial likelihood that a reasonable investor would consider the information important in making a buy, sell, or hold decision. It is objective, not subjective — it doesn't matter whether the actual investor considered it important, but whether a reasonable investor would have."},
  {id:27,topic:"Market Abuse",day:31,q:"What is spoofing in the context of market manipulation?",opts:["Trading in a security you don't own","Placing large orders with the intent to cancel them before execution — creating a false impression of supply or demand to move prices","Front-running client orders","Spreading false rumours about a company's financial condition"],correct:1,exp:"Spoofing involves placing genuine-looking orders with no intention of executing them, solely to move the market price. Once the price moves in the desired direction, the spoofer cancels the fake orders and profits from positions taken beforehand. It became a criminal offence in the US under Dodd-Frank and has been aggressively prosecuted by DOJ and CFTC."},
  {id:28,topic:"Volcker Rule",day:33,q:"What is the key difference between prohibited proprietary trading and permitted market-making under Volcker?",opts:["There is no difference — both are prohibited","Market-making is permitted because it is done at the client's request to facilitate their transactions — the bank is acting as an intermediary, not taking directional bets with its own capital","Market-making is permitted only for government securities","Proprietary trading is permitted if it is hedged"],correct:1,exp:"The Volcker Rule's market-making exemption hinges on intent and client facilitation. A bank can hold positions to accommodate expected near-term customer demand — but cannot take directional positions betting on market movements with the firm's own capital. The line between the two is often difficult to draw in practice, which is why Volcker compliance programs are extensive."},
  {id:29,topic:"Competition Law",day:38,q:"Under the Bank Holding Company Act, a tying arrangement occurs when:",opts:["A bank charges different rates to different customers","A bank conditions the availability or terms of one product on the customer taking another product","A bank refuses to lend to a competitor's customer","A bank offers discounts for using multiple products"],correct:1,exp:"The anti-tying provision of the Bank Holding Company Act prohibits banks from conditioning the availability or terms of credit on the customer purchasing additional products from the bank or its affiliates. Telling a borrower 'you can only have the loan if you also use us for your next bond offering' is the classic example. The key is conditioning — not merely offering packages."},
  {id:30,topic:"Supervision",day:40,q:"Under the FCA Senior Managers Regime, a Senior Manager is personally responsible for:",opts:["Every compliance failure that occurs in the firm","The areas of the firm that fall within their Statement of Responsibilities — they must take reasonable steps to prevent regulatory breaches within their area","Only failures they personally caused","Failures that result in fines above £1 million"],correct:1,exp:"SMCR creates individual accountability by mapping responsibilities to named senior managers via Statements of Responsibilities. A senior manager can be held personally liable if a breach occurred within their area and they failed to take reasonable steps to prevent it. This shifted regulatory enforcement from institutional fines to personal accountability — a significant change in how compliance operates."},
  {id:31,topic:"15a-6",day:35,q:"What does Rule 15a-6 permit a non-US broker-dealer to do with US investors without registering with the SEC?",opts:["Nothing — all broker-dealer activity with US investors requires SEC registration","Distribute research, effect transactions in certain circumstances with major US institutional investors, and use a chaperone arrangement with a registered US broker-dealer","Full access to US investors for any product","Only government bond transactions"],correct:1,exp:"Rule 15a-6 creates a limited exemption allowing non-US broker-dealers to distribute research to US investors and to effect certain transactions — provided they use a registered US broker-dealer as chaperone. The chaperone takes legal and compliance responsibility for the US side of the activity. Without a 15a-6 arrangement, engaging with US investors requires full SEC registration."},
  {id:32,topic:"Reg FD",day:42,q:"Regulation FD applies to whom, and how does it affect investment banks?",opts:["It applies directly to investment banks' communications with investors","It applies to public companies' communications with market professionals — which means banks must be careful about what non-public information they receive from public company clients, as selectively receiving and using it can implicate Rule 10b-5","It only applies to retail investor communications","It has no relevance to investment banking"],correct:1,exp:"Regulation FD imposes obligations on public companies, not investment banks directly. But banks are affected because if a public company selectively discloses information to a bank (outside a carved-out relationship like underwriting), and that information is MNPI, the bank receiving and trading on it faces Rule 10b-5 liability. Understanding Reg FD is essential to understanding what public company clients can and cannot tell you."},

]

const QUICK_REF=[
  {topic:"MNPI & Information Barriers",phase:1,content:`<strong>What it is:</strong> Material Non-Public Information — information about a company that (a) a reasonable investor would consider important in making an investment decision and (b) has not been disclosed to the public.\n\n<strong>Key rules:</strong> SEC Rule 10b-5 (anti-fraud), Regulation FD (selective disclosure), your firm's information barrier policy.\n\n<strong>Information barriers:</strong> Chinese walls separating teams that hold MNPI from teams that trade or have investor-facing roles. Must be erected as soon as MNPI is received — not at deal announcement.\n\n<strong>Restricted list:</strong> Securities that the firm's trading desks cannot trade because the firm holds MNPI. A core compliance tool — manage it carefully.\n\n<strong>Wall-crossing:</strong> The controlled process of sharing MNPI with a specific person for a legitimate business purpose. Must be documented. The person crossed becomes subject to trading restrictions immediately.\n\n<strong>Red flag:</strong> Any time non-public information about an issuer crosses a desk — ask: who needs to be walled off? Does this go on the restricted list?`},
  {topic:"Marketing Materials — Fair, Balanced, Not Misleading",phase:1,content:`<strong>The standard (FINRA Rule 2210):</strong> All communications with the public must be fair, balanced, and not misleading.\n\n<strong>Fair:</strong> Presents information honestly without cherry-picking favourable data.\n\n<strong>Balanced:</strong> Gives appropriate weight to risks, not just benefits or upside.\n\n<strong>Not misleading:</strong> Cannot create a false impression — includes misleading by omission. A technically accurate document can still be misleading.\n\n<strong>Substantiation:</strong> All factual claims must be capable of verification. "Market-leading margins" requires data. "Best-in-class" requires a source.\n\n<strong>Disclaimer-washing:</strong> A boilerplate disclaimer at the back does not cure a structurally misleading document. Regulators assess the overall impression.\n\n<strong>Practical test:</strong> Would a reasonable investor reading this document come away with an accurate picture of the risks and merits? If not — flag it.`},
  {topic:"Rule 144A / Reg S — Quick Reference",phase:1,content:`<strong>Rule 144A:</strong> Exemption from SEC registration for sales to Qualified Institutional Buyers (QIBs) — institutions managing at least $100M in securities on a discretionary basis.\n\n<strong>Regulation S:</strong> Exemption for securities offered and sold outside the US to non-US persons in offshore transactions. Typical deal = 144A (US QIBs) + Reg S (non-US investors).\n\n<strong>Restricted legend:</strong> Notice on 144A bonds limiting resale to QIBs or other exempt transactions until registered or restriction lapses.\n\n<strong>Distribution compliance period:</strong> Reg S restriction period (typically 40 days) preventing flowback of securities into the US market post-issuance.\n\n<strong>Registration rights:</strong> Issuer contractually commits to registering 144A bonds with SEC within set timeframe — failure triggers penalty interest.\n\n<strong>Practical question:</strong> Before advising on secondary market participation — is the buyer a QIB? Are the bonds still restricted? Has the distribution compliance period lapsed?`},
  {topic:"ECM Compliance — Quiet Period & Stabilization",phase:1,content:`<strong>Quiet period:</strong> Period during which the issuer and underwriters restrict communications to prevent gun-jumping — premature statements that could constitute an illegal offer or condition the market.\n\n<strong>Gun-jumping:</strong> Making public statements before the registration statement is effective. The SEC can delay or invalidate the offering.\n\n<strong>Research blackout:</strong> Period when underwriting bank analysts are restricted from publishing on the issuer — prevents research being used as a marketing tool for the deal.\n\n<strong>Stabilization:</strong> Post-IPO purchase of shares by the lead underwriter to prevent excessive price decline. Permitted within strict limits — disclosed, time-limited, capped at IPO price. Uses the overallotment (greenshoe) option.\n\n<strong>Lock-up:</strong> Period post-IPO during which insiders cannot sell shares — typically 180 days.\n\n<strong>Follow-on MNPI risk:</strong> Higher than IPO — the company is already public and has ongoing disclosure obligations. Non-public deal information must be walled off from the equities desk immediately.`},
  {topic:"Conflicts of Interest — Core Principles",phase:1,content:`<strong>Types of conflict:</strong> (1) Advisory vs lending — bank earns fees from both, may favour structures that benefit one. (2) Allocation — favouring investors due to other commercial relationships. (3) Research vs banking — analysts covering issuers the bank underwrites. (4) Multiple mandates — acting for both buyer and seller.\n\n<strong>How compliance manages conflicts:</strong> Identify → assess materiality → disclose to affected party → obtain consent → or decline one mandate.\n\n<strong>Fairness opinions:</strong> Structural conflict — the bank opines on fairness of a deal it is also earning success fees on. Must be disclosed to the board.\n\n<strong>Allocation conflicts:</strong> Giving a larger allocation to a client due to unrelated commercial relationships is a conflict. Allocation decisions must be documented and defensible.\n\n<strong>Key question:</strong> Does the bank have a financial interest that could reasonably influence its judgment? If yes — that is a conflict and it must be managed.`},,
  {topic:"Sanctions in Trade Finance",phase:3,content:"<strong>What OFAC requires:</strong> All transactions must be screened against the SDN list and other sanctions lists. Sanctioned entities cannot participate in any transaction, directly or indirectly.\n\n<strong>The 50% rule:</strong> An entity is blocked if 50% or more of its ownership is held by a blocked person — even if the entity does not appear on any list. Tracing ultimate beneficial ownership is mandatory.\n\n<strong>Trade-specific risk:</strong> Trade finance is higher-risk for sanctions evasion because it involves documents rather than direct fund transfers. Over-invoicing, under-invoicing, and misrepresentation of goods are all common evasion methods.\n\n<strong>Dual-use goods:</strong> Goods with both civilian and military applications require export control screening under the EAR (Export Administration Regulations).\n\n<strong>Red flag:</strong> Transactions involving high-risk jurisdictions, unusual payment terms, vague descriptions of goods, or third-party intermediaries with no clear commercial purpose."},
  {topic:"MNPI — Full Framework",phase:4,content:"<strong>The rule (Rule 10b-5):</strong> It is unlawful to trade securities while in possession of material non-public information, or to tip others who then trade.\n\n<strong>Materiality:</strong> The reasonable investor test — would a reasonable investor consider this information important in making a buy/sell decision? Mergers, earnings surprises, regulatory decisions, major contracts, and debt restructurings are almost always material.\n\n<strong>Non-public:</strong> Information not yet broadly disseminated to the market. A press release makes it public — a conversation with the CFO does not.\n\n<strong>Tipping:</strong> Passing MNPI to someone who trades on it creates liability for both tipper and tippee, even if the tipper did not trade themselves.\n\n<strong>Information barriers:</strong> Separation between teams that hold MNPI (advisory, lending) and teams that could trade on it (equities, credit trading). Must be erected at mandate — not at announcement.\n\n<strong>Restricted list:</strong> Securities the firm cannot trade because it holds MNPI. Updated whenever a new mandate is received. Check before any trade."},
  {topic:"Volcker Rule — Quick Reference",phase:4,content:"<strong>What is prohibited:</strong> Proprietary trading — taking positions for the firm's own account to profit from short-term price movements.\n\n<strong>What is permitted:</strong> Market-making (inventory to facilitate client demand), underwriting, hedging of specific identified risks, government securities trading, foreign bank activity outside the US.\n\n<strong>Covered funds:</strong> Banks cannot acquire or retain ownership interests in hedge funds or private equity funds. The covered fund definition is broad but has exceptions.\n\n<strong>Key exceptions:</strong> Loan securitization exclusion (CLOs backed primarily by loans), foreign public funds, certain ABS, wholly-owned subsidiaries.\n\n<strong>Compliance program:</strong> Requires comprehensive written compliance program, CEO attestation, and (for large banks) quantitative metrics and regulatory reporting.\n\n<strong>Red flag:</strong> Any position held for price appreciation with no clear client facilitation rationale. Duration of holding and absence of client activity are key indicators."},
  {topic:"Competition Law & Tying",phase:4,content:"<strong>The prohibition:</strong> Under the Bank Holding Company Act Section 106, banks cannot condition the availability or terms of credit on the customer purchasing additional products from the bank or its affiliates.\n\n<strong>What constitutes tying:</strong> 'You can only get the loan if you also give us the bond mandate.' Explicit or implicit — both are problematic.\n\n<strong>What is permitted:</strong> Offering package pricing or discounts for using multiple products, as long as there is no condition — the customer can decline the package and still get the credit.\n\n<strong>Price-fixing and market allocation:</strong> Separately prohibited under antitrust law.\n\n<strong>Red flag:</strong> Any banker conversation suggesting a credit decision is contingent on other business. Document clearly that credit and other products are offered independently."}

];

const SCENARIOS={
  "DCM":[{title:"The pre-announcement call",difficulty:"medium",text:"A DCM banker calls at 4pm. He's working on a bond offering for a large corporate client that hasn't been announced yet. He wants to call three institutional investors this evening to 'sound out appetite' before the formal roadshow next week. He says: 'Don't worry, I won't tell them the issuer's name — I'll just describe it as a BBB-rated industrial company.' He wants to know if this is okay and whether he needs to do anything special. What is your advice?"},{title:"The bought deal pressure",difficulty:"hard",text:"It's 7am. A DCM syndicate banker says the team is considering a bought deal for a large investment-grade issuer — the bank would buy the entire bond issue outright and sell it to investors. The deal is time-sensitive and the banker wants to launch in two hours. He asks: 'Do we need to do anything differently compliance-wise versus a normal bookbuild?' What do you tell him, and what do you need to know before he launches?"}],
  "Leveraged Finance":[{title:"The weak financials teaser",difficulty:"easy",text:"A leveraged finance banker sends you a draft investor teaser for a loan syndication. The company is being acquired by a PE firm and the bank is syndicating a £400m leveraged loan. The document describes the leverage ratio as 'in line with industry peers' but you recall from the term sheet that the leverage is actually at the high end of the market. The banker says: 'It's not technically wrong — we're just being optimistic.' What do you do?"},{title:"The sponsor pressure",difficulty:"hard",text:"A large PE sponsor is syndicating a £600m leveraged buyout loan. The sponsor calls you directly — bypassing the deal team — to say that one of the risk disclosures you've required in the investor presentation is 'too negative' and will 'kill the deal.' He says he'll take his next mandate to a competitor bank. The deal team is watching nervously. What do you do?"}],
  "ECM":[{title:"The CEO keynote",difficulty:"medium",text:"Your bank is leading an IPO for a mid-cap technology company. The IPO is in its quiet period — the registration statement has been filed but is not yet effective. The company's CEO is giving a keynote at a major industry conference tomorrow and plans to discuss the company's growth strategy and recent product launches. The ECM banker calls: 'The CEO really wants to do this — it's great publicity. Can he present if we just don't mention the IPO?' What is your advice?"},{title:"The follow-on MNPI",difficulty:"medium",text:"Your bank has been mandated for a follow-on equity offering for a listed company. The deal is not yet announced. The coverage banker mentions the equity sales desk has been receiving inbound calls from three large investors asking about the company's outlook — apparently there's market speculation about a share issuance. The sales desk wants to know if they can respond to investor questions. What do you tell them?"}],
  "144A / Reg S":[{title:"The European investor",difficulty:"medium",text:"A bond was issued six months ago as 144A/Reg S. A European asset manager — which manages €500m in securities — wants to buy €10m of the bonds in the secondary market. The bond documentation carries a restricted legend. The banker calls: 'Can this investor buy the bonds? They're European so Reg S should cover it, right?' Walk through your analysis and what questions you need answered."},{title:"The retail enquiry",difficulty:"easy",text:"A high-yield bond was issued last month as a 144A offering. A wealthy individual — not an institution — calls your private banking desk saying he heard about the bond from a friend and wants to invest £500k. The private banker calls you: 'He's a sophisticated guy and he's done bigger deals than this. Can we sell it to him?' What is your answer and why?"}],
  "Marketing Materials":[{title:"The rushed teaser",difficulty:"medium",text:"It's 8:30am. A leveraged finance banker calls in a panic. He has an investor meeting at 10am for a high-yield bond deal and needs compliance sign-off on a 15-page investor presentation. You open the document and notice: (1) it describes the company as 'the market leader in its segment' with no supporting data; (2) it projects 35% EBITDA growth over three years with no sensitivity analysis or risk factors; (3) the disclaimer at the back says 'forward-looking statements are not guarantees.' The banker says: 'The disclaimer covers it — can you just sign off?' What do you do?"},{title:"The ESG claim",difficulty:"hard",text:"The Green & Sustainable Hub has produced a marketing document for a 'green bond' issuance. The document states the proceeds will be used for 'sustainable infrastructure projects.' When you dig into the use-of-proceeds section you notice the definition of eligible projects is extremely broad and includes certain fossil fuel infrastructure upgrades classified internally as 'transition.' The banker says all major rating agencies have approved the framework. What are your compliance concerns?"}],
  "Acquisition Finance":[{title:"The dual mandate conflict",difficulty:"hard",text:"Your bank has been mandated to both advise the acquirer on a £2bn M&A transaction AND provide £800m of acquisition financing. The advisory team and the lending team are both working on the deal. The M&A partner is about to send the fairness opinion to the board recommending the deal proceed. A board member has asked whether the bank has any conflicts. How do you advise, and what needs to be disclosed?"},{title:"The restricted list failure",difficulty:"medium",text:"It's Monday morning. You receive an urgent email from the head of equities. Over the weekend it emerged that one of the equity traders bought shares in a listed company on Friday afternoon. It has now come to light that the M&A team received a mandate to advise on the acquisition of that same company on Thursday morning — and the target was added to the restricted list on Thursday afternoon. The trader says he didn't know. What are the immediate steps you take?"}],
  "Convertibles":[{title:"The short seller",difficulty:"medium",text:"Your bank is issuing a convertible bond for a listed company. The deal is being wall-crossed with five hedge funds this afternoon — they will receive non-public information about the terms before the deal is announced tomorrow morning. One of the hedge funds calls the syndicate desk after being wall-crossed and says they want to immediately establish a short position in the company's equity as a 'delta hedge.' The banker asks: 'This is normal practice for convertible investors — is it okay for them to short now?' What is your advice?"},{title:"The derivatives desk",difficulty:"hard",text:"Your bank is arranging a €300m convertible bond for a listed European company. The equity derivatives desk has heard rumours about the deal through the market and wants to start trading options on the issuer — they say they haven't been formally wall-crossed and are acting on public information only. The head of derivatives calls you to confirm they are 'clean.' What is your analysis?"}],
  "Secondary Loan Market":[{title:"The agent bank sale",difficulty:"hard",text:"Your bank is the agent bank on a £300m leveraged loan. In that role you receive monthly financial reporting from the borrower and are currently aware that the company is in private discussions about a potential covenant waiver — a fact not publicly known. Your bank's loan trading desk wants to sell down £50m of its own position in the secondary market. The trading desk says: 'We do this all the time — we can just use a big boy letter.' What is your analysis?"},{title:"The creditor committee",difficulty:"hard",text:"Your bank sits on the creditor committee for a distressed borrower. In that role you have received detailed non-public financial projections, asset valuations, and a draft restructuring support agreement. Your bank's credit trading desk now wants to trade out of its position in the borrower's term loan. The trader says: 'Can we just get a big boy letter from the buyer and proceed?' What do you tell him?"}],
  "Mixed":[{title:"The complex mandate",difficulty:"hard",text:"A private equity firm has asked your bank to: (1) advise on the acquisition of a listed UK company for £1.5bn; (2) arrange a £900m leveraged loan; and (3) arrange a £200m convertible bond to refinance existing PE fund debt. The deal teams across advisory, leveraged finance, and ECM all want to start work immediately. A senior banker asks: 'What do we need to do from compliance before we kick off?' Give your structured answer covering all three products."},{title:"The information barrier failure",difficulty:"hard",text:"It's Monday morning. You receive an urgent email from the head of equities. Over the weekend it emerged that an equity trader bought shares in a listed company on Friday afternoon. It has now come to light that the M&A team received an acquisition mandate for that company on Thursday morning and the target was added to the restricted list Thursday afternoon. The trader says he didn't know about the restricted list. What are the immediate steps you take and what are the key compliance issues?"}],
},
  "Aviation Finance":[
    {title:"The sanctioned airline",difficulty:"hard",text:"Your bank is arranging a $500m secured loan for a Middle Eastern airline to finance 10 new aircraft. Two days before signing, your AML team flags that one of the airline's minority shareholders — holding 8% — appears on a watch list. The airline says the shareholder is a passive investor with no operational involvement. The deal team wants to proceed. What do you do?"},
    {title:"The cross-border lease",difficulty:"medium",text:"A European leasing company wants your bank to finance an operating lease of three aircraft to a carrier in a country with US export restrictions on certain aircraft components. The aircraft are US-manufactured. The deal team says: 'This is just a lease — export controls don't apply to us.' What is your analysis?"}
  ],
  "Real Estate":[
    {title:"The friendly appraiser",difficulty:"easy",text:"A commercial real estate developer seeking a $200m construction loan suggests using a specific appraisal firm they have worked with for years. The banker says: 'It will make the process smoother.' What are the compliance issues and what do you tell the banker?"},
    {title:"The inflated valuation",difficulty:"hard",text:"Your bank has originated a $150m CRE loan being packaged into a CMBS. During structuring you notice the appraisal cap rate assumptions appear optimistic compared to recent comparables. The structuring team says the appraisal was done by an approved firm and meets all formal requirements. What do you do?"}
  ],
  "Restructuring":[
    {title:"The creditor committee trade",difficulty:"hard",text:"Your bank sits on the creditor committee for a distressed retail company. You have received the 13-week cash flow forecast, a draft RSA, and a confidential asset valuation. Your credit trading desk calls — they want to sell the bank's term loan position. The trader says: 'We'll just use a big boy letter.' What is your analysis?"},
    {title:"The public-side lender",difficulty:"medium",text:"A borrower is in financial difficulty. Your bank has: (1) a private-side lending team that sits on the informal lender group and receives monthly management accounts; (2) a credit trading desk that trades the borrower's publicly listed bonds. The trading desk says they're acting on public information only and haven't been formally wall-crossed. Is there a problem?"}
  ],
  "CLOs":[
    {title:"The equity tranche question",difficulty:"hard",text:"Your bank arranged a CLO 18 months ago. The CLO manager now wants your bank to take down the equity tranche because they cannot find a third-party buyer. The deal team says: 'We're just providing liquidity — it's not proprietary trading.' What Volcker Rule questions does this raise?"},
    {title:"The CLO manager's information",difficulty:"medium",text:"Your bank's CLO management team is considering adding a new leveraged loan to a CLO they manage. The loan is to a company that is also a current client of your bank's restructuring advisory team — a fact not publicly known. The CLO manager says they make independent investment decisions and aren't subject to the bank's information barriers. What is your analysis?"}
  ],
"Trade Finance":[
    {title:"The dual-use shipment",difficulty:"hard",text:"Your bank is asked to issue a letter of credit for a client importing industrial pumps from Germany to a buyer in the Middle East. During document review, your trade finance team notices the pumps have specifications that could make them suitable for use in oil and gas infrastructure — but also potentially for certain industrial processes that are subject to export controls. The deal team says: 'These are commercially available pumps — there's nothing special about them.' What do you do?"},
    {title:"The anti-boycott clause",difficulty:"medium",text:"A client submits an LC application for a transaction importing textiles. Buried in the terms is a clause stating that the goods must be certified as not originating from Israel and that the shipping company must have no Israeli connections. The relationship manager says: 'This is standard for this region — we see this all the time.' What are the compliance obligations and what must happen before this LC can be issued?"}
  ],
  "M&A Advisory":[
    {title:"The leaking mandate",difficulty:"hard",text:"Your bank has been advising on a potential acquisition of a listed company for three weeks. The deal is confidential and only five people at your bank know about it. This morning you notice unusual trading activity in the target's shares — the volume has tripled in the last two days and the share price is up 8%. The deal team says it's probably just market noise. What do you do?"},
    {title:"The conflicted mandate",difficulty:"medium",text:"Your bank is advising the acquirer on a $2bn takeover. Separately, your leveraged finance team has been approached to provide the acquisition debt. And your ECM team has just been told the acquirer plans to do a rights issue to partially fund the deal. Three different teams want to work on this transaction. What are the compliance issues and what needs to happen before each team can proceed?"}
  ],
  "Green Finance":[
    {title:"The ambitious targets",difficulty:"hard",text:"Your Green & Sustainable Hub is structuring a sustainability-linked bond for a large energy company. The coupon step-up mechanism is tied to the company reducing its Scope 1 emissions by 10% by 2027. Your analysis shows the company has already reduced emissions by 7% in the last two years and is on track to meet the target without any additional action. The deal team says: 'The targets are forward-looking — there's nothing wrong with them.' What are the compliance concerns?"},
    {title:"The green label dispute",difficulty:"medium",text:"An issuer wants to label a bond as a green bond. The use of proceeds includes: (1) financing new solar farms — clearly green; (2) upgrading an existing gas power plant to be more efficient — arguably transition; (3) general corporate purposes. The issuer has obtained a second-party opinion saying the framework is aligned with the ICMA Green Bond Principles. What questions do you need to ask and what is your compliance concern?"}
  ],
  "MNPI & Information Barriers":[
    {title:"The overheard conversation",difficulty:"medium",text:"A compliance officer overhears a conversation in the lift between two bankers discussing what sounds like a live, unannounced M&A mandate. One banker mentions the target company's name. The compliance officer knows the firm's equities desk has been actively trading that company's shares this week. What are the immediate steps?"},
    {title:"The wall-crossing request",difficulty:"hard",text:"The head of leveraged finance calls you. He wants to wall-cross the head of the credit trading desk on a new LBO mandate so the trading desk can manage the firm's existing credit exposure to the target. The trading desk currently holds $50m of the target's bonds. He says: 'It's a risk management issue — we need to know if we should be reducing.' What is your analysis and what conditions must be met before you can approve the wall-crossing?"}
  ],
  "Market Abuse":[
    {title:"The unusual options activity",difficulty:"hard",text:"It is a Thursday afternoon. Your surveillance system flags unusual options activity in a mid-cap company — someone has bought a large number of out-of-the-money call options expiring next Friday. You check and your bank is currently advising on an acquisition of that company, which is scheduled to be announced on Monday. The options were purchased through an account associated with a fund manager who had lunch with one of your M&A bankers last Tuesday. What do you do?"},
    {title:"The rate-fixing conversation",difficulty:"hard",text:"During a routine review of communications, your surveillance team flags a chat message where a trader at your bank says to a trader at another bank: 'We're going heavy on the fix today — you should too.' The message relates to a benchmark rate that your bank helps set. What are the compliance issues and what are the immediate steps?"}
  ],
  "Conflicts of Interest":[
    {title:"The research upgrade",difficulty:"medium",text:"Your bank has just won a mandate to underwrite a secondary offering for a listed company. Two days later, your research analyst publishes an upgrade of the company's stock from Neutral to Buy. The upgrade happens to coincide with the bookbuilding period for the secondary offering. What are the compliance issues?"},
    {title:"The multiple mandates",difficulty:"hard",text:"Your bank is simultaneously: (1) advising the acquirer on a takeover; (2) acting as lender to the target; (3) holding the target on the restricted list due to the acquirer mandate. The target's lenders are now forming a lender group to respond to the takeover approach. Your lending team wants to participate in the lender group and receive information about the target's position in the negotiation. What are the compliance issues and what can and cannot proceed?"}
  ],
  "Volcker Rule":[
    {title:"The market-making line",difficulty:"hard",text:"Your rates trading desk holds a $500m position in a corporate bond. The desk claims the position is market-making inventory — held to facilitate client trades. Your analysis shows the position has been held for 47 days with minimal client activity in that bond during the period. The desk head says: 'We're waiting for the right client to come along.' What are the Volcker Rule concerns?"},
    {title:"The fund investment",difficulty:"medium",text:"Your bank's private banking division wants to co-invest alongside a client in a new private equity fund. The fund would acquire stakes in several unlisted companies. The PE fund manager is a third party with no affiliation to the bank. The private banking team says: 'This is just portfolio management — Volcker doesn't apply to us.' What is your analysis?"}
  ],
  "Supervision":[
    {title:"The undisclosed error",difficulty:"hard",text:"A junior analyst approaches you informally and tells you she has discovered an error in a financial model that was used in three client pitches over the last six months. The error overstated projected returns by approximately 15%. The pitches did not result in mandates, but the clients received the presentations. She asks you to keep this between you while she figures out how to fix it. What do you do?"},
    {title:"The rogue trader signs",difficulty:"hard",text:"During a routine supervision review, you notice that one trader has been consistently booking trades just below the limit that triggers a second-level review. Over the past quarter, 23 of his 27 trades have been at 95-99% of his limit. His P&L is strong. His manager says: 'He's one of our best — he knows how to manage his book.' What are the compliance concerns and what do you do?"}
  ],

}

const BUILT_IN_GLOSSARY=[
  {word:"MNPI",definition:"Material Non-Public Information. Information about a company that a reasonable investor would consider important in making an investment decision, and which has not been publicly disclosed. Trading on MNPI is insider trading.",context:""},
  {word:"Wall-crossing",definition:"The controlled process of sharing MNPI with a specific person for a legitimate business purpose (e.g. to get an investor's feedback on a deal before announcement). The person crossed becomes subject to trading restrictions immediately and must be documented.",context:""},
  {word:"Bookbuilding",definition:"The process during a bond or equity offering where the bank collects indications of interest from investors to determine demand, which is then used to set the final price and size of the deal.",context:""},
  {word:"QIB",definition:"Qualified Institutional Buyer. Under Rule 144A, an institution that owns and invests on a discretionary basis at least $100M in securities of non-affiliated issuers. Only QIBs can participate in 144A offerings.",context:""},
  {word:"Restricted legend",definition:"A notice on an unregistered security (e.g. a 144A bond) limiting resale to QIBs or other exempt transactions until the bonds are registered with the SEC or the restriction period lapses.",context:""},
  {word:"Big boy letter",definition:"A letter in which a sophisticated buyer of a loan acknowledges that the seller may hold MNPI not disclosed to the buyer, and agrees to proceed anyway. Does NOT protect against fraud or active misrepresentation.",context:""},
  {word:"Gun-jumping",definition:"Making public statements or offers before the registration statement is effective in an IPO or securities offering. This can condition the market and violate securities laws — the SEC can delay or invalidate the offering.",context:""},
  {word:"Greenshoe",definition:"Also called the overallotment option. Allows the lead underwriter to sell more shares than originally planned in an IPO (typically up to 15% more), and then buy back shares in the aftermarket to stabilize the price.",context:""},
  {word:"Delta hedge",definition:"A strategy used by convertible bond investors to neutralize the equity price risk embedded in the convertible. They short a number of shares proportional to the conversion delta, isolating the credit and volatility components.",context:""},
  {word:"Restricted list",definition:"A list maintained by compliance of securities that the firm's trading desks cannot trade because the firm holds MNPI about the issuer. A fundamental information barrier control.",context:""},
];

// ── State ─────────────────────────────────────────────────────────────────────
const S={
  tab:'today',
  dark:ld('dark',false),
  completedDays:ld('completedDays',{}),
  dayNotes:ld('dayNotes',{}),
  dayConf:ld('dayConf',{}),
  midNotes:ld('midNotes',{}),
  quizHistory:ld('quizHistory',[]),
  flaggedQs:ld('flaggedQs',[]),
  advisoryLog:ld('advisoryLog',[]),
  streak:ld('streak',0),
  lastStudy:ld('lastStudy',null),
  studiedDates:ld('studiedDates',[]),
  modal:null,
  quiz:null,
  logSearch:'',
  glossary:ld('glossary',BUILT_IN_GLOSSARY.map(g=>({...g,pending:false}))),
  caseState:{scenario:null,userResponse:'',gradeResult:null,loading:false},
  caseFilter:'all',
  caseDifficulty:'all',
};

function ld(k,d){try{const v=localStorage.getItem(k);return v?JSON.parse(v):d;}catch{return d;}}
function sv(){['completedDays','dayNotes','dayConf','midNotes','quizHistory','flaggedQs','advisoryLog','streak','lastStudy','studiedDates','glossary','dark'].forEach(k=>{try{localStorage.setItem(k,JSON.stringify(S[k]));}catch{}});}

// ── Computed ──────────────────────────────────────────────────────────────────
const tc=()=>Object.keys(S.completedDays).filter(k=>S.completedDays[k]).length;
const pct=()=>Math.round((tc()/TOTAL)*100);
const curDay=()=>DAYS.find(d=>!S.completedDays[d.day])||DAYS[DAYS.length-1];
const isWeak=(id)=>{const qs=S.quizHistory.filter(q=>q.dayId===id);if(!qs.length)return false;return qs[qs.length-1].score/qs[qs.length-1].total<0.6;};
const isDue=(id)=>{if(!S.completedDays[id])return false;return(Date.now()-new Date(S.completedDays[id]).getTime())/86400000>14;};
const avgScore=()=>{const r=S.quizHistory.filter(q=>!q.caseGrade);if(!r.length)return 0;return Math.round(r.reduce((a,q)=>a+(q.score/q.total)*100,0)/r.length);};
const availQs=()=>{const done=Object.keys(S.completedDays).filter(k=>S.completedDays[k]).map(Number);return QUIZ_BANK.filter(q=>done.includes(q.day));};
const completedTopics=()=>{const done=Object.keys(S.completedDays).filter(k=>S.completedDays[k]).map(Number);return Object.keys(SCENARIOS).filter(t=>DAYS.filter(d=>done.includes(d.day)).some(d=>d.topic.toLowerCase().includes(t.toLowerCase().split(' ')[0])||t==='Mixed'));};
const nextAssessment=()=>{const cur=curDay();return ASSESSMENTS.find(a=>a.week>=cur.week)||null;};
const daysToAssessment=()=>{const a=nextAssessment();if(!a)return null;const cur=curDay();return Math.max(0,(a.week-cur.week)*5-(curDay().day%5));};

// ── Dark mode ─────────────────────────────────────────────────────────────────
function toggleDark(){S.dark=!S.dark;applyDark();sv();}
function applyDark(){document.body.className=S.dark?'dark':'';document.getElementById('dark-btn').textContent=S.dark?'☀️':'🌙';}

// ── Render ────────────────────────────────────────────────────────────────────
function render(){
  document.getElementById('streak-val').textContent=S.streak;
  document.getElementById('pct-val').textContent=pct();
  document.getElementById('prog-fill').style.width=pct()+'%';
  // assessment countdown
  const da=daysToAssessment(),na=nextAssessment();
  const ab=document.getElementById('assess-bar');
  if(na&&da!==null&&da<=14){ab.innerHTML=`<div style="padding:5px 0 8px;display:flex;justify-content:space-between;align-items:center"><span class="b-assess">📝 ${na.label} assessment in ~${da} days</span></div>`;}
  else{ab.innerHTML='';}
  ['today','progress','cases','log','quiz','ref','glossary'].forEach(t=>{const el=document.getElementById('tab-'+t);if(el)el.className='tab'+(S.tab===t?' on':'');});
  const body=document.getElementById('body');
  if(S.tab==='today')body.innerHTML=rToday();
  else if(S.tab==='progress')body.innerHTML=rProgress();
  else if(S.tab==='cases')body.innerHTML=rCases();
  else if(S.tab==='log')body.innerHTML=rLog();
  else if(S.tab==='quiz')body.innerHTML=rQuiz();
  else if(S.tab==='ref')body.innerHTML=rRef();
  else if(S.tab==='glossary')body.innerHTML=rGlossary();
  rModal();
}

function rToday(){
  const cur=curDay();
  const due=DAYS.filter(d=>isDue(d.day));
  const weekDays=DAYS.filter(d=>d.week===cur.week);
  let h='';
  if(due.length)h+=`<div class="review-banner">⚠️ <span><strong>${due.length} day${due.length>1?'s':''}</strong> due for review: ${due.map(d=>d.title).join(', ')}</span></div>`;
  h+=`<div class="card"><div class="card-hdr"><div class="card-hdr-sub">Current lesson</div><div class="card-hdr-title">${cur.topic}</div><div class="card-hdr-meta">Week ${cur.week} · Day ${cur.day} · Phase ${cur.phase}</div></div><div class="card-body">`;
  if(cur.reading.length){
    h+=`<div class="asgn"><div class="asgn-lbl">Reading list</div>`;
    cur.reading.forEach((r,i)=>{
      h+=`<div class="read-item"><div class="read-num">${i+1}</div><div class="read-lbl">`;
      if(r.url)h+=`<a href="${r.url}" target="_blank">${r.label}${r.yt?'<span class="yt-badge">▶ YT</span>':''}</a>`;
      else h+=r.label;
      h+=`</div></div>`;
    });
    h+=`</div>`;
  }else{
    h+=`<div class="asgn"><div class="asgn-body" style="font-style:italic;color:var(--text3)">No external reading today — synthesis and application only.</div></div>`;
  }
  h+=`<div class="asgn"><div class="asgn-lbl">Written deliverable</div><div class="asgn-body" style="white-space:pre-line">${cur.deliverable}</div></div>`;
  h+=`<div class="asgn"><div class="asgn-lbl">Homework</div>`;
  cur.homework.forEach((q,i)=>{h+=`<div class="hw-q"><span class="hw-n">Q${i+1}.</span><span class="asgn-body">${q}</span></div>`;});
  h+=`</div>`;
  // Mid-day notes
  const mn=S.midNotes[cur.day]||'';
  h+=`<div class="asgn-lbl">Notes (jot anything mid-study)</div>
  <textarea class="day-note-input" id="mid-note-ta" rows="2" placeholder="Questions that come up, things to look up, connections to real deals...">${mn}</textarea>
  <button class="btn-sm btn-accent" style="width:100%;margin-bottom:10px" onclick="saveMidNote(${cur.day})">Save note</button>`;
  h+=`<button class="btn" onclick="openComplete(${cur.day})">Mark Day ${cur.day} complete</button>`;
  h+=`</div></div>`;
  // Week grid
  h+=`<div class="sl">Week ${cur.week} at a glance</div><div class="week-grid">`;
  weekDays.forEach(d=>{const done=S.completedDays[d.day],isCur=d.day===cur.day,weak=isWeak(d.day);const cls=done?'done':isCur?'cur':weak?'weak':'';const conf=S.dayConf[d.day];h+=`<div class="wc ${cls}"><div class="wc-num">D${d.day}</div><div class="wc-title">${d.title}</div>${done&&conf?`<div class="wc-conf" style="color:${conf>=4?'var(--success)':conf>=3?'var(--warn)':'var(--danger)'}">${'★'.repeat(conf)}</div>`:''}</div>`;});
  h+=`</div>`;
  h+=`<div class="sl">All lessons</div>`;
  DAYS.forEach(d=>{const done=S.completedDays[d.day],isCur=d.day===cur.day,weak=done&&isWeak(d.day),due=isDue(d.day),note=S.dayNotes[d.day],conf=S.dayConf[d.day];let dc='dot-future',di=d.day;if(done&&weak){dc='dot-weak';di='⚠';}else if(done){dc='dot-done';di='✓';}else if(isCur){dc='dot-cur';}h+=`<div class="day-row ${isCur?'cur':!done&&!isCur?'locked':''}"><div class="dot ${dc}">${di}</div><div class="day-info"><div class="day-topic">${d.topic}</div><div class="day-meta">Week ${d.week} · Day ${d.day}${conf?' · '+'★'.repeat(conf):''}</div>${note?`<div class="day-note">"${note}"</div>`:''}</div>${isCur?`<span class="tag tag-now">NOW</span>`:''}${due&&done?`<span class="tag tag-review">Review</span>`:''}${weak?`<span class="tag tag-weak">Weak</span>`:''}</div>`;});
  return h;
}

function saveMidNote(dayId){const ta=document.getElementById('mid-note-ta');if(ta){S.midNotes[dayId]=ta.value;sv();}}

function rProgress(){
  let h=`<div class="stats"><div class="stat"><div class="stat-v">${tc()}</div><div class="stat-l">Days done</div></div><div class="stat"><div class="stat-v">${pct()}%</div><div class="stat-l">Complete</div></div><div class="stat"><div class="stat-v" style="color:${avgScore()>=80?'var(--success)':avgScore()>=60?'var(--warn)':'var(--accent)'}">${avgScore()}%</div><div class="stat-l">Quiz avg</div></div></div>`;
  h+=`<div class="sl">Study calendar — last 28 days</div>${rCalendar()}`;
  // Assessment countdown
  const na=nextAssessment(),da=daysToAssessment();
  if(na){h+=`<div class="card" style="border-radius:11px;margin-bottom:11px"><div style="padding:12px 14px"><div class="sl" style="margin:0 0 4px">Next assessment</div><div style="font-size:16px;font-weight:700;color:var(--text)">${na.label}</div><div style="font-size:13px;color:var(--text4)">Week ${na.week} · approx ${da} study days away</div></div></div>`;}
  h+=`<div class="sl">Phases</div>`;
  PHASES.forEach(p=>{h+=`<div class="card" style="border-radius:11px;margin-bottom:7px"><div style="padding:11px 13px"><div style="font-size:11px;font-weight:700;letter-spacing:.08em;text-transform:uppercase;color:${p.color};margin-bottom:2px">${p.label} · Weeks ${p.weeks}</div><div style="font-size:14px;font-weight:600;color:var(--text)">${p.title}</div></div></div>`;});
  // Case performance
  const caseHistory=S.quizHistory.filter(q=>q.caseGrade);
  if(caseHistory.length){
    h+=`<div class="sl" style="margin-top:6px">Case performance by topic</div>`;
    const byTopic={};caseHistory.forEach(c=>{if(!byTopic[c.topic])byTopic[c.topic]={pass:0,partial:0,fail:0,total:0};byTopic[c.topic][c.caseGrade]=(byTopic[c.topic][c.caseGrade]||0)+1;byTopic[c.topic].total++;});
    Object.keys(byTopic).forEach(t=>{const d=byTopic[t];const passRate=Math.round((d.pass/d.total)*100);h+=`<div class="weak-row"><div style="flex:1"><div class="weak-topic">${t}</div><div style="font-size:12px;color:var(--text4)">${d.total} case${d.total>1?'s':''} · ${d.pass} pass · ${d.partial||0} partial · ${d.fail||0} fail</div><div class="weak-bar-wrap"><div class="weak-bar-fill" style="width:${passRate}%;background:${passRate>=70?'var(--success)':passRate>=40?'var(--warn)':'var(--danger)'}"></div></div></div><div style="font-size:18px;font-weight:700;color:${passRate>=70?'var(--success)':passRate>=40?'var(--warn)':'var(--danger)'};">${passRate}%</div></div>`;});
  }
  if(S.quizHistory.filter(q=>!q.caseGrade).length){
    h+=`<div class="sl" style="margin-top:6px">Quiz history</div>`;
    [...S.quizHistory].filter(q=>!q.caseGrade).reverse().slice(0,8).forEach(q=>{const sp=Math.round(q.score/q.total*100);h+=`<div class="day-row"><div class="dot ${sp>=80?'dot-done':sp>=60?'dot-weak':'dot-future'}" style="${sp<60?'background:var(--danger-bg);color:var(--danger)':''}">${sp>=80?'✓':sp+'%'}</div><div class="day-info"><div class="day-topic">${q.score}/${q.total} correct</div><div class="day-meta">${q.date}</div></div><div style="font-size:19px;font-weight:700;color:${sp>=80?'var(--success)':sp>=60?'var(--warn)':'var(--danger)'}">${sp}%</div></div>`;});
  }
  const weakDays=DAYS.filter(d=>S.completedDays[d.day]&&isWeak(d.day));
  if(weakDays.length){h+=`<div class="sl" style="margin-top:6px">Flagged — quiz below 60%</div>`;weakDays.forEach(d=>{h+=`<div class="day-row"><div class="dot dot-weak">⚠</div><div class="day-info"><div class="day-topic">${d.topic}</div><div class="day-meta">Day ${d.day}</div></div><span class="tag tag-weak">Revisit</span></div>`;});}
  return h;
}

function rCalendar(){
  const days=['Su','Mo','Tu','We','Th','Fr','Sa'];
  let h=`<div class="cal-grid">`;
  days.forEach(d=>{h+=`<div class="cal-lbl">${d}</div>`;});
  const today=new Date(),start=new Date(today);start.setDate(today.getDate()-27);
  for(let i=0;i<start.getDay();i++)h+=`<div class="cal-d cal-empty">.</div>`;
  for(let i=0;i<28;i++){const d=new Date(start);d.setDate(start.getDate()+i);const ds=d.toDateString(),isT=d.toDateString()===today.toDateString(),studied=S.studiedDates.includes(ds);h+=`<div class="cal-d ${studied?'cal-studied':isT?'cal-today':'cal-normal'}">${d.getDate()}</div>`;}
  return h+'</div>';
}

function rCases(){
  const cs=S.caseState;
  const topics=completedTopics();
  let h='';
  if(!topics.length){return `<div style="text-align:center;padding:50px 16px;color:var(--text4)"><div style="font-size:40px;margin-bottom:10px">🏛️</div><div style="font-size:15px;font-weight:600;color:var(--text2);margin-bottom:6px">No cases yet</div><div style="font-size:14px;line-height:1.6">Complete at least one day to unlock AI-generated advisory scenarios.</div></div>`;}
  if(!cs.scenario){
    h+=`<div class="sl">Generate a scenario</div>`;
    // Filters
    h+=`<div style="display:flex;gap:6px;margin-bottom:12px;overflow-x:auto;padding-bottom:4px">`;
    ['all','easy','medium','hard'].forEach(d=>{h+=`<button class="btn-sm ${S.caseDifficulty===d?'':'btn-muted'}" style="${S.caseDifficulty===d?'background:var(--accent);color:#fff':''}" onclick="S.caseDifficulty='${d}';render()">${d==='all'?'All difficulties':d.charAt(0).toUpperCase()+d.slice(1)}</button>`;});
    h+=`</div>`;
    // Custom scenario button
    h+=`<div class="card" style="margin-bottom:11px"><div class="card-body" style="display:flex;gap:10px;align-items:center">
      <div style="flex:1"><div style="font-size:14px;font-weight:600;color:var(--text);margin-bottom:2px">Write your own scenario</div><div style="font-size:12px;color:var(--text4)">Log something that came up at work and get it graded</div></div>
      <button class="btn-sm" style="background:var(--accent);color:#fff;flex-shrink:0" onclick="openCustomCase()">Write →</button>
    </div></div>`;
    topics.forEach(t=>{
      const scenList=SCENARIOS[t]||[];
      const filtered=S.caseDifficulty==='all'?scenList:scenList.filter(s=>s.difficulty===S.caseDifficulty);
      if(!filtered.length)return;
      h+=`<div style="font-size:12px;font-weight:700;letter-spacing:.07em;text-transform:uppercase;color:var(--text4);margin-bottom:7px">${t}</div>`;
      filtered.forEach((sc,i)=>{
        h+=`<button onclick="launchCase('${t}',${scenList.indexOf(sc)})" style="width:100%;text-align:left;padding:13px;margin-bottom:8px;background:var(--surface);border:1px solid var(--border);border-radius:11px;display:flex;justify-content:space-between;align-items:center;gap:10px">
          <div><div style="font-size:14px;font-weight:600;color:var(--text);margin-bottom:3px">${sc.title}</div><div style="font-size:12px;color:var(--text4)">${sc.text.substring(0,70)}...</div></div>
          <div style="display:flex;flex-direction:column;align-items:flex-end;gap:5px;flex-shrink:0"><span class="diff diff-${sc.difficulty}">${sc.difficulty}</span><span style="color:var(--accent);font-size:18px">→</span></div>

      });
    });
    const caseHistory=S.quizHistory.filter(q=>q.caseGrade);
    if(caseHistory.length){
      h+=`<div class="sl" style="margin-top:4px">Recent case results</div>`;
      caseHistory.slice(-5).reverse().forEach(q=>{const color=q.caseGrade==='pass'?'var(--success)':q.caseGrade==='partial'?'var(--warn)':'var(--danger)';h+=`<div class="day-row"><div class="dot" style="background:${q.caseGrade==='pass'?'var(--success-bg)':q.caseGrade==='partial'?'var(--warn-bg)':'var(--danger-bg)'};color:${color}">${q.caseGrade==='pass'?'✓':q.caseGrade==='partial'?'~':'✗'}</div><div class="day-info"><div class="day-topic">${q.scenarioTitle||q.topic}</div><div class="day-meta">${q.date}</div></div><span style="font-size:12px;font-weight:700;color:${color};text-transform:capitalize">${q.caseGrade}</span></div>`;});
    }
    return h;
  }
  // Active scenario
  h+=`<div class="card"><div class="case-hdr"><div class="card-hdr-sub" style="color:rgba(255,255,255,.7)">Advisory scenario · ${cs.scenario.topic} <span class="diff diff-${cs.scenario.difficulty}" style="margin-left:6px">${cs.scenario.difficulty}</span></div><div class="card-hdr-title" style="font-size:17px">${cs.scenario.title}</div></div><div class="card-body">
  <div class="scenario-txt">${cs.scenario.text}</div>`;

      <button class="btn-sm btn-muted" style="flex:1" onclick="resetCase()">New scenario</button>
      <button class="btn" style="flex:2;padding:12px" onclick="gradeCase()">Submit for grading</button>

  }
  if(cs.loading){h+=`<div style="text-align:center;padding:20px 0"><div style="font-size:14px;color:var(--accent);font-weight:600;margin-bottom:8px">Grading your response</div><div class="loading-dots"><span></span><span></span><span></span></div></div>`;}
  if(cs.gradeResult){
    const gr=cs.gradeResult;const grCls=gr.grade==='pass'?'grade-pass':gr.grade==='partial'?'grade-partial':'grade-fail';const grLbl=gr.grade==='pass'?'✓ Strong response':gr.grade==='partial'?'~ Partial — key gaps identified':'✗ Significant gaps — review needed';
    h+=`<div class="grade-result ${grCls}"><div class="grade-lbl">${grLbl}</div>${gr.feedback}</div>`;

  }

function rQuiz(){
  if(!S.quiz){
    const av=availQs(),fl=S.flaggedQs.map(id=>QUIZ_BANK.find(q=>q.id===id)).filter(Boolean);
    let h=`<div class="card"><div style="padding:22px 16px;text-align:center"><div style="font-size:36px;margin-bottom:9px">🎯</div><div style="font-size:16px;font-weight:700;margin-bottom:5px">On-demand quiz</div><div style="font-size:14px;color:var(--text3);line-height:1.6;margin-bottom:15px">${av.length} questions available from your completed days.</div>${av.length>=5?`<button class="btn" onclick="startQuiz('random')">Start 10-question quiz</button>`:`<div style="font-size:14px;color:var(--text4);font-style:italic">Complete at least 5 days to unlock.</div>`}</div></div>`;
    if(fl.length){h+=`<div class="sl">Flagged (${fl.length})</div><div class="card" style="border-radius:12px"><div style="padding:11px 13px">`;fl.forEach(q=>{h+=`<div style="padding:8px 0;border-bottom:1px solid var(--border);display:flex;justify-content:space-between;align-items:center;gap:9px"><div style="flex:1;min-width:0"><div style="font-size:13px;font-weight:600;color:var(--text);line-height:1.4">${q.q.substring(0,55)}...</div><div style="font-size:11px;color:var(--text4);margin-top:2px">${q.topic}</div></div><button class="btn-sm btn-danger" style="font-size:11px;flex-shrink:0" onclick="unflagQ(${q.id})">Remove</button></div>`;});h+=`</div>`;if(fl.length>=5)h+=`<div style="padding:0 13px 13px"><button class="btn" style="background:var(--warn)" onclick="startQuiz('flagged')">Quiz flagged questions</button></div>`;h+=`</div>`;}
    if(S.quizHistory.filter(q=>!q.caseGrade).length){h+=`<div class="sl" style="margin-top:4px">Recent scores</div>`;S.quizHistory.filter(q=>!q.caseGrade).slice(-5).reverse().forEach(q=>{const sp=Math.round(q.score/q.total*100);h+=`<div class="day-row"><div class="dot ${sp>=80?'dot-done':sp>=60?'dot-weak':'dot-future'}" style="${sp<60?'background:var(--danger-bg);color:var(--danger)':''}">${sp>=80?'✓':sp+'%'}</div><div class="day-info"><div class="day-topic">${q.score}/${q.total} correct</div><div class="day-meta">${q.date}</div></div><div style="font-size:19px;font-weight:700;color:${sp>=80?'var(--success)':sp>=60?'var(--warn)':'var(--danger)'}">${sp}%</div></div>`;});}
    return h;
  }
  const qz=S.quiz;if(qz.done)return rQuizResults();
  const q=qz.questions[qz.current],answered=qz.answers[qz.current]!==undefined,sel=qz.answers[qz.current];
  let h=`<div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:9px"><div class="sl" style="margin:0">Q${qz.current+1} of ${qz.questions.length} · ${q.topic}</div><button class="btn-sm btn-muted" onclick="S.quiz=null;render()">Exit</button></div>`;
  h+=`<div style="display:flex;gap:4px;margin-bottom:13px">`;qz.questions.forEach((_,i)=>{const a=qz.answers[i];h+=`<div style="flex:1;height:3px;border-radius:2px;background:${a===undefined?'var(--border)':a===qz.questions[i].correct?'var(--success)':'var(--danger)'}"></div>`;});h+=`</div>`;
  h+=`<div class="card" style="margin-bottom:11px"><div style="padding:14px"><div style="font-size:15px;font-weight:600;line-height:1.55;color:var(--text)">${q.q}</div></div></div>`;
  q.opts.forEach((opt,i)=>{const isC=answered&&i===q.correct,isW=answered&&sel===i&&i!==q.correct,isSC=answered&&i===q.correct&&sel!==i;h+=`<button class="q-option ${isC?'correct':isW?'wrong':isSC?'show-correct':''}" ${answered?'disabled':`onclick="answerQ(${i})"`}><span class="q-letter">${String.fromCharCode(65+i)}</span>${opt}</button>`;});
  if(answered){h+=`<div class="exp-box"><div class="exp-lbl">Explanation</div><div class="exp-txt">${q.exp}</div></div>`;const fl=S.flaggedQs.includes(q.id);h+=`<div style="display:flex;gap:8px;margin-top:10px"><button class="btn-sm ${fl?'btn-success':'btn-warn'}" style="flex:1" onclick="${fl?`unflagQ(${q.id})`:`flagQ(${q.id})`}">${fl?'🏳 Unflag':'🚩 Flag'}</button><button class="btn" style="flex:2;padding:12px" onclick="nextQ()">${qz.current<qz.questions.length-1?'Next →':'See results'}</button></div>`;}
  return h;
}

function rQuizResults(){
  const qz=S.quiz,score=qz.questions.filter((q,i)=>qz.answers[i]===q.correct).length,sp=Math.round(score/qz.questions.length*100);
  let h=`<div style="background:linear-gradient(135deg,#4B3FBF,#3A7BD5);border-radius:13px;padding:22px 18px;text-align:center;margin-bottom:13px;color:#fff"><div style="font-size:50px;font-weight:700;letter-spacing:-.03em">${sp}%</div><div style="font-size:15px;font-weight:600;margin-top:4px">${score} / ${qz.questions.length} correct</div><div style="font-size:14px;opacity:.8;margin-top:5px">${sp>=80?'Excellent.':sp>=60?'Good — review the misses below.':'Review these topics and try again.'}</div></div>`;
  qz.questions.forEach((q,i)=>{const correct=qz.answers[i]===q.correct;h+=`<div class="card" style="border-radius:11px;margin-bottom:7px;border-color:${correct?'#D0ECD8':'#FFDDDD'}"><div style="padding:11px 13px;display:flex;gap:9px;align-items:flex-start"><div style="width:22px;height:22px;border-radius:50%;background:${correct?'var(--success-bg)':'var(--danger-bg)'};display:flex;align-items:center;justify-content:center;flex-shrink:0;font-size:11px;font-weight:700;color:${correct?'var(--success)':'var(--danger)'}">${correct?'✓':'✗'}</div><div style="flex:1"><div style="font-size:13px;font-weight:600;line-height:1.45;margin-bottom:3px;color:var(--text)">${q.q}</div>${!correct?`<div style="font-size:13px;color:var(--success);margin-bottom:3px">→ ${q.opts[q.correct]}</div>`:''}<div style="font-size:11px;color:var(--text4);font-style:italic">${q.topic}</div></div></div></div>`;});
  h+=`<div style="display:flex;gap:8px;margin-top:13px"><button class="btn-ghost" style="flex:1" onclick="S.quiz=null;render()">Done</button><button class="btn" style="flex:2" onclick="startQuiz('random')">Try again</button></div>`;
  return h;
}

function rGlossary(){
  const pending=S.glossary.filter(g=>g.pending);
  const defined=S.glossary.filter(g=>!g.pending);
  let h=`<div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:11px"><div class="sl" style="margin:0">${S.glossary.length} words</div><button class="btn-sm" style="background:var(--accent);color:#fff" onclick="S.modal='addword';render()">+ Add word</button></div>`;
  if(S.glossary.length>4)h+=`<div class="search-wrap"><svg class="search-ico" width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg><input class="search-inp" type="text" placeholder="Search words..." id="gloss-search" oninput="filterGlossary(this.value)"></div>`;
  if(pending.length){
    h+=`<div class="sl">Pending — tap to generate definition</div>`;
    pending.forEach((g,i)=>{const ri=S.glossary.indexOf(g);h+=`<div class="gloss-item gloss-pending"><div style="display:flex;justify-content:space-between;align-items:flex-start"><div><div class="gloss-word">${g.word}</div>${g.context?`<div class="gloss-ctx">"${g.context}"</div>`:''}</div><div style="display:flex;gap:6px;flex-shrink:0;margin-left:8px"><button class="btn-sm btn-accent" onclick="generateDef(${ri})">Generate</button><button class="btn-sm btn-danger" onclick="deleteWord(${ri})">Del</button></div></div></div>`;});
  }
  if(defined.length){
    h+=`<div class="sl" style="margin-top:6px">Definitions</div>`;
    defined.forEach(g=>{const ri=S.glossary.indexOf(g);h+=`<div class="gloss-item" id="gloss-${ri}"><div style="display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:4px"><div class="gloss-word">${g.word}</div><button class="btn-sm btn-danger" style="font-size:11px;flex-shrink:0;margin-left:8px" onclick="deleteWord(${ri})">Del</button></div>${g.context?`<div class="gloss-ctx">"${g.context}"</div>`:''}<div class="gloss-def" id="gloss-def-${ri}">${g.definition||'<span style="color:var(--text4);font-style:italic">No definition yet</span>'}</div>${g.definition?'':''}</div>`;});
  }
  if(!S.glossary.length)h+=`<div style="text-align:center;padding:40px 14px;color:var(--text4)"><div style="font-size:36px;margin-bottom:8px">📚</div><div style="font-size:15px;font-weight:600;color:var(--text2);margin-bottom:4px">No words yet</div><div style="font-size:14px;line-height:1.5">Save words you hear at work that you're not sure about. Generate plain-English definitions when you're ready to learn them.</div></div>`;
  return h;

function filterGlossary(val){document.querySelectorAll('.gloss-item').forEach(el=>{const word=el.querySelector('.gloss-word')?.textContent||'';el.style.display=word.toLowerCase().includes(val.toLowerCase())||!val?'':'none';});}

async function generateDef(idx){
  const g=S.glossary[idx];if(!g)return;
  const defEl=document.getElementById(`gloss-def-${idx}`);
  if(defEl)defEl.innerHTML=`<div class="loading-dots"><span></span><span></span><span></span></div>`;
  try{
    const res=await fetch('https://api.anthropic.com/v1/messages',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({model:'claude-sonnet-4-20250514',max_tokens:400,system:`You are a compliance and finance educator. Provide a clear, plain-English definition of financial/legal/compliance terminology for someone who is new to investment banking compliance but has 10 years of financial crimes compliance experience. Keep it practical, 2-4 sentences. Focus on why the term matters in compliance contexts. Do not use jargon without immediately explaining it. Return only the definition text, no labels or preamble.`,messages:[{role:'user',content:`Define "${g.word}" in the context of investment banking compliance.${g.context?` The person heard it in this context: "${g.context}".`:''}`}]})});
    const data=await res.json();const def=data.content?.find(c=>c.type==='text')?.text||'Unable to generate definition.';
    S.glossary[idx]={...g,pending:false,definition:def};sv();render();
  }catch(e){if(defEl)defEl.innerHTML=`<span style="color:var(--danger)">Unable to connect. Please try again.</span>`;}
}

function sw(t){S.tab=t;render();}

function exportLog(){const txt=S.advisoryLog.map((e,i)=>`Entry ${i+1} — ${e.date}${e.realError?' [REAL MISS]':''}\n${'─'.repeat(40)}\nBusiness Objective: ${e.objective}\n\nRisk Identified: ${e.risk}\n\nCompliant Path: ${e.path}${e.notes?'\n\nNotes: '+e.notes:''}\n`).join('\n\n');const a=document.createElement('a');a.href=URL.createObjectURL(new Blob([txt],{type:'text/plain'}));a.download='advisory_log_'+new Date().toISOString().slice(0,10)+'.txt';a.click();}
function startQuiz(mode){let pool=mode==='flagged'?S.flaggedQs.map(id=>QUIZ_BANK.find(q=>q.id===id)).filter(Boolean):availQs();if(pool.length<5){alert('Not enough questions available yet. Complete more days first.');return;}const qs=[...pool].sort(()=>Math.random()-.5).slice(0,Math.min(10,pool.length));S.quiz={questions:qs,current:0,answers:{},done:false};render();}
